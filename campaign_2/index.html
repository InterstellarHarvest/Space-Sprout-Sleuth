<script src="space_sprout_sleuth_data.js"></script>
<script src="campaign_2_data.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// SPACE SPROUT SLEUTH — Game Engine
// ═══════════════════════════════════════════════════════════════════

(function() {
  'use strict';

  // ── Campaign registry (Phase 2) ─────────────────────────────────
  // Both data files are loaded by <script> tags above. We wrap them into
  // a single GAME_DATA.campaigns[] registry so the engine can switch between
  // them via setActiveCampaign(). Every existing reference to GAME_DATA.cases
  // and GAME_DATA.ranks keeps working unchanged — setActiveCampaign repoints
  // those properties to the active campaign's arrays.
  GAME_DATA.campaigns = [
    {
      id: "c1",
      name: "Solar Agricultural Authority",
      cases: GAME_DATA.cases,
      ranks: GAME_DATA.ranks
    },
    {
      id: CAMPAIGN_2_DATA.id,
      name: CAMPAIGN_2_DATA.name,
      cases: CAMPAIGN_2_DATA.cases,
      ranks: CAMPAIGN_2_DATA.ranks
    }
  ];

  function setActiveCampaign(idx) {
    if (idx < 0 || idx >= GAME_DATA.campaigns.length) idx = 0;
    GAME_DATA.cases = GAME_DATA.campaigns[idx].cases;
    GAME_DATA.ranks = GAME_DATA.campaigns[idx].ranks;
  }

  // ── DOM refs ────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const menuBar       = $('menu-bar');
  const menuRank      = $('menu-rank');
  const menuCase      = $('menu-case');
  const locationName  = $('location-name');
  const locationSub   = $('location-subtitle');
  const sceneWrap     = $('scene-wrap');
  const sceneImg      = $('scene-img');
  const sceneStarsCvs = $('scene-stars');
  const sceneStarsCtx = sceneStarsCvs.getContext('2d');
  const sceneFxOverlay = $('scene-fx-overlay');
  const sceneFxOverlayCtx = sceneFxOverlay.getContext('2d');
  const sceneStatic   = $('scene-static');
  const sceneStaticCtx = sceneStatic.getContext('2d');
  const speakerBar    = $('speaker-bar');
  const infoArea      = $('info-area');
  const actionArea    = $('action-area');
  const actionGrid    = $('action-grid');
  const diagnoseBtn   = $('diagnose-btn');
  const titleScreen   = $('title-screen');
  const titleStars    = $('title-stars');
  const victoryScreen = $('victory-screen');
  const resumePrompt  = $('resume-prompt');
  const charCreate    = $('char-create');
  const nameInput     = $('name-input');
  const beginBtn      = $('begin-btn');
  const transmissionBtn = $('transmission-btn');

  // ── Sprite helpers ──────────────────────────────────────────────
  // Try to load a PNG. Returns true (async) if it exists, false otherwise.
  // Use: tryLoadImg(imgEl, '../sprites/scene_iss.png')
  function tryLoadImg(imgEl, src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        imgEl.src = src;
        resolve(true);
      };
      img.onerror = () => resolve(false);
      img.src = src;
    });
  }

  // ── Spritesheet cache ────────────────────────────────────────────
  // Caches loaded spritesheet images + parsed JSON per path
  const spritesheetCache = {};

  function loadSpritesheet(spriteSrc, jsonSrc) {
    const key = spriteSrc;
    if (spritesheetCache[key]) return Promise.resolve(spritesheetCache[key]);

    // Use embedded frame data if available (works with file:// protocol)
    // Fall back to fetch for backwards compatibility with JSON files
    let framesPromise;
    if (typeof SPRITE_FRAMES !== 'undefined') {
      if (spriteSrc === '../sprites/spritesheet.png' && SPRITE_FRAMES.ui) {
        framesPromise = Promise.resolve(SPRITE_FRAMES.ui);
      } else if (spriteSrc === '../sprites/badge_spritesheet.png' && SPRITE_FRAMES.badges) {
        framesPromise = Promise.resolve(SPRITE_FRAMES.badges);
      } else if (spriteSrc === '../sprites/alien/spritesheet.png' && SPRITE_FRAMES.alien) {
        framesPromise = Promise.resolve(SPRITE_FRAMES.alien);
      } else if (spriteSrc.match(/\/sprites\/\w+\/spritesheet\.png$/) && SPRITE_FRAMES.crew) {
        framesPromise = Promise.resolve(SPRITE_FRAMES.crew);
      }
    }
    // Phase 2: Campaign 2 embedded frame data (sprites_c2/*)
    if (!framesPromise && typeof CAMPAIGN_2_FRAMES !== 'undefined') {
      if (spriteSrc === 'sprites_c2/spritesheet_c2.png' && CAMPAIGN_2_FRAMES.ui) {
        framesPromise = Promise.resolve(CAMPAIGN_2_FRAMES.ui);
      } else if (spriteSrc === 'sprites_c2/badge_spritesheet_c2.png' && CAMPAIGN_2_FRAMES.badges) {
        framesPromise = Promise.resolve(CAMPAIGN_2_FRAMES.badges);
      } else {
        // Per-character crew spritesheets (including delegate_* for Case 6)
        const m = spriteSrc.match(/^sprites_c2\/(\w+)\/spritesheet\.png$/);
        if (m && CAMPAIGN_2_FRAMES['crew_' + m[1]]) {
          framesPromise = Promise.resolve(CAMPAIGN_2_FRAMES['crew_' + m[1]]);
        }
        // Nova unmasked variant (Case 6)
        if (!framesPromise && spriteSrc === 'sprites_c2/nova/spritesheet_unmasked.png' && CAMPAIGN_2_FRAMES.crew_nova_unmasked) {
          framesPromise = Promise.resolve(CAMPAIGN_2_FRAMES.crew_nova_unmasked);
        }
      }
    }
    if (!framesPromise) {
      framesPromise = fetch(jsonSrc).then(r => r.json()).then(j => j.frames);
    }

    return Promise.all([
      new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = spriteSrc;
      }),
      framesPromise
    ]).then(([img, frames]) => {
      const data = { img, frames };
      spritesheetCache[key] = data;
      return data;
    });
  }

  // ── UI Spritesheet (consolidated non-crew sprites) ──────────────
  let uiSheetData = null; // { img, frameMap: { filename: {x,y,w,h} } }
  // Phase 2: Campaign 2 has its own parallel UI sheet loaded alongside C1.
  // drawUiFrame() below checks C1 first, then falls through to C2 — any frame
  // name that lives only in spritesheet_c2 is still reachable via sprites.portrait
  // or sprites.actionIcon without changing the call site.
  let uiSheetDataC2 = null;

  function loadUiSheet() {
    return loadSpritesheet('../sprites/spritesheet.png', '../sprites/spritesheet.json').then(data => {
      const frameMap = {};
      data.frames.forEach(f => { frameMap[f.filename] = f.frame; });
      uiSheetData = { img: data.img, frameMap: frameMap };
      return uiSheetData;
    }).catch(() => {});
  }

  function loadUiSheetC2() {
    return loadSpritesheet('sprites_c2/spritesheet_c2.png', 'sprites_c2/spritesheet_c2.json').then(data => {
      const frameMap = {};
      data.frames.forEach(f => { frameMap[f.filename] = f.frame; });
      uiSheetDataC2 = { img: data.img, frameMap: frameMap };
      return uiSheetDataC2;
    }).catch(() => {});
  }

  // ── Badge Spritesheet (separate, 512px badges) ─────────────────
  let badgeSheetData = null; // { img, frameMap: { filename: {x,y,w,h} } }
  // Phase 2: Campaign 2 badges live in their own separate sheet with their own
  // set of 5 filenames (federation_trainee → galactic_botanist). Campaign-aware
  // helpers getActiveBadgeSheet() / getActiveBadgeFrames() below pick the right
  // sheet + frame name array based on STATE.currentCampaign.
  let badgeSheetDataC2 = null;

  function loadBadgeSheet() {
    return loadSpritesheet('../sprites/badge_spritesheet.png', '../sprites/badge_spritesheet.json').then(data => {
      const frameMap = {};
      data.frames.forEach(f => { frameMap[f.filename] = f.frame; });
      badgeSheetData = { img: data.img, frameMap: frameMap };
      return badgeSheetData;
    }).catch(() => {});
  }

  function loadBadgeSheetC2() {
    return loadSpritesheet('sprites_c2/badge_spritesheet_c2.png', 'sprites_c2/badge_spritesheet_c2.json').then(data => {
      const frameMap = {};
      data.frames.forEach(f => { frameMap[f.filename] = f.frame; });
      badgeSheetDataC2 = { img: data.img, frameMap: frameMap };
      return badgeSheetDataC2;
    }).catch(() => {});
  }

  function getActiveBadgeSheet() {
    return (STATE.currentCampaign === 1) ? badgeSheetDataC2 : badgeSheetData;
  }

  function drawBadgeFrame(canvas, frameName) {
    const sheet = getActiveBadgeSheet();
    if (!sheet) return;
    const frame = sheet.frameMap[frameName];
    if (!frame) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(sheet.img, frame.x, frame.y, frame.w, frame.h, 0, 0, canvas.width, canvas.height);
  }

  let alienSheetData = null;

  function loadAlienSheet() {
    return loadSpritesheet('../sprites/alien/spritesheet.png', '../sprites/alien/spritesheet.json').then(data => {
      const frameMap = {};
      data.frames.forEach(f => { frameMap[f.filename] = f.frame; });
      alienSheetData = { img: data.img, frameMap: frameMap };
      return alienSheetData;
    }).catch(() => {});
  }

  function drawAlienFrame(canvas, frameName) {
    if (!alienSheetData) return;
    const frame = alienSheetData.frameMap[frameName];
    if (!frame) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(alienSheetData.img, frame.x, frame.y, frame.w, frame.h, 0, 0, canvas.width, canvas.height);
  }

  // Draw a named frame from the UI spritesheet onto a canvas.
  // Phase 2: checks Campaign 1 sheet first, then falls through to Campaign 2
  // sheet so existing sprites.portrait / sprites.actionIcon fields can reference
  // frames from either sheet by filename.
  function drawUiFrame(canvas, frameName) {
    let sheet = null;
    let frame = null;
    if (uiSheetData && uiSheetData.frameMap[frameName]) {
      sheet = uiSheetData;
      frame = uiSheetData.frameMap[frameName];
    } else if (uiSheetDataC2 && uiSheetDataC2.frameMap[frameName]) {
      sheet = uiSheetDataC2;
      frame = uiSheetDataC2.frameMap[frameName];
    }
    if (!sheet || !frame) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cw = canvas.width;
    const ch = canvas.height;
    if (frame.w === cw && frame.h === ch) {
      ctx.drawImage(sheet.img, frame.x, frame.y, cw, ch, 0, 0, cw, ch);
    } else {
      const scale = Math.min(cw / frame.w, ch / frame.h);
      const dw = frame.w * scale;
      const dh = frame.h * scale;
      ctx.drawImage(sheet.img, frame.x, frame.y, frame.w, frame.h,
        (cw - dw) / 2, (ch - dh) / 2, dw, dh);
    }
  }

  // ── Portrait system (spritesheet-based) ─────────────────────────
  // Build portrait HTML — canvas for spritesheet, or emoji fallback
  function portraitHtml(clue) {
    const sprites = clue.sprites || {};
    if (sprites.alienPortrait) {
      return '<div class="speaker-portrait" id="active-portrait">' +
        '<canvas id="portrait-canvas" width="96" height="96" data-alien-frame="' + sprites.alienPortrait + '"></canvas></div>';
    }
    if (sprites.spritesheet) {
      return '<div class="speaker-portrait" id="active-portrait">' +
        '<canvas id="portrait-canvas" width="96" height="96"></canvas></div>';
    }
    if (sprites.portrait) {
      return '<div class="speaker-portrait" id="active-portrait">' +
        '<canvas id="portrait-canvas" width="96" height="96" data-ui-frame="' + sprites.portrait + '"></canvas></div>';
    }
    return '<div class="speaker-portrait"><div class="portrait-fallback">' + clue.icon + '</div></div>';
  }

  // Build action icon — small canvas from spritesheet portrait, or emoji fallback
  //
  // Phase 2 precedence order: explicit actionIcon wins over spritesheet. This
  // is a no-op for Campaign 1 (no C1 crew clue sets both) but lets Campaign 2
  // crew override the auto-drawn spritesheet icon with a species portrait.
  // E.g. Vressk crew has `spritesheet: "sprites_c2/vressk_botanist/..."` for the
  // speaker bar talk anim AND `actionIcon: "portrait_species_vressk.png"` so
  // the button shows the species face instead of the NPC face.
  function actionIconHtml(clue) {
    const sprites = clue.sprites || {};
    if (sprites.alienIcon) {
      return '<canvas class="action-icon-canvas" data-alien-frame="' + sprites.alienIcon + '" width="96" height="96"></canvas>';
    }
    if (sprites.actionIcon) {
      // UI spritesheet canvas icon (drawUiFrame checks both C1 and C2 sheets)
      return '<canvas class="action-icon-canvas" data-ui-frame="' + sprites.actionIcon + '" width="96" height="96"></canvas>';
    }
    if (sprites.spritesheet) {
      // Crew spritesheet canvas icon — will be drawn after DOM insert
      return '<canvas class="action-icon-canvas" data-sheet="' + sprites.spritesheet +
        '" data-json="' + sprites.spritesheetJson + '" width="96" height="96"></canvas>';
    }
    return '<span>' + clue.icon + '</span>';
  }

  // Draw static portrait frame from crew spritesheet onto a canvas element
  function drawPortraitIcon(canvas, sheetData) {
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const portraitFrame = sheetData.frames[sheetData.frames.length - 1].frame;
    drawCrewFrame(ctx, sheetData.img, portraitFrame);
  }

  // After DOM insert, fill in any spritesheet icon canvases (crew + UI sheet)
  function fillActionIcons() {
    document.querySelectorAll('.action-icon-canvas').forEach(canvas => {
      if (canvas.dataset.alienFrame) {
        // Alien spritesheet
        if (alienSheetData) {
          drawAlienFrame(canvas, canvas.dataset.alienFrame);
        } else {
          loadAlienSheet().then(() => drawAlienFrame(canvas, canvas.dataset.alienFrame));
        }
      } else if (canvas.dataset.sheet) {
        // Crew spritesheet
        loadSpritesheet(canvas.dataset.sheet, canvas.dataset.json)
          .then(data => drawPortraitIcon(canvas, data)).catch(() => {});
      } else if (canvas.dataset.uiFrame) {
        // UI spritesheet
        drawUiFrame(canvas, canvas.dataset.uiFrame);
      }
    });
  }

  // ── Portrait talk animation (spritesheet) ───────────────────────
  let talkAnimRAF = null;
  let talkAnimData = null;

  // Draw a crew spritesheet frame onto a 96×96 canvas with uniform scaling
  // (fit-to-canvas, no aspect distortion). C2 crew sheets have varying frame
  // sizes (100×102, 71×103, 95×101, etc.) — stretching to 96×96 causes
  // vertical shifting. This helper scales to fit and centers the result.
  function drawCrewFrame(ctx, img, f) {
    ctx.clearRect(0, 0, 96, 96);
    if (f.w === 96 && f.h === 96) {
      ctx.drawImage(img, f.x, f.y, 96, 96, 0, 0, 96, 96);
      return;
    }
    // Contain scaling: fit the full frame into the 96×96 canvas without
    // cropping. Horizontally centered, vertically top-anchored so the head
    // is always visible. Narrow frames get side padding; short frames get
    // bottom padding. No content is ever cropped.
    const scale = Math.min(96 / f.w, 96 / f.h);
    const dw = f.w * scale;
    const dh = f.h * scale;
    const dx = (96 - dw) / 2;
    ctx.drawImage(img, f.x, f.y, f.w, f.h, dx, 0, dw, dh);
  }

  function startTalkAnim(clue) {
    stopTalkAnim();
    const sprites = clue.sprites || {};
    if (!sprites.spritesheet) return;

    const canvas = document.getElementById('portrait-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const pingPong = sprites.pingPong || false;

    loadSpritesheet(sprites.spritesheet, sprites.spritesheetJson).then(data => {
      const animFrames = data.frames.slice(0, -1);
      const totalFrames = animFrames.length;
      const loopDuration = 2000;
      const pauseDuration = 500;
      const animDuration = loopDuration - pauseDuration;
      const stepCount = pingPong ? (totalFrames - 1) * 2 : totalFrames - 1;
      const frameInterval = animDuration / stepCount;

      talkAnimData = { ctx, img: data.img, animFrames, totalFrames,
        pauseDuration, frameInterval, stepCount, pingPong,
        loopStart: performance.now() };

      function tick(now) {
        if (!talkAnimData) return;
        const d = talkAnimData;
        const cycleDuration = d.pauseDuration + d.frameInterval * d.stepCount;
        const elapsed = (now - d.loopStart) % cycleDuration;
        let frameIdx = 0;
        if (elapsed > d.pauseDuration) {
          const step = Math.min(
            Math.floor((elapsed - d.pauseDuration) / d.frameInterval),
            d.stepCount - 1
          );
          if (d.pingPong) {
            frameIdx = step < d.totalFrames ? step : (d.totalFrames - 1) * 2 - step;
          } else {
            frameIdx = step;
          }
        }
        drawCrewFrame(d.ctx, d.img, d.animFrames[frameIdx].frame);
        talkAnimRAF = requestAnimationFrame(tick);
      }
      talkAnimRAF = requestAnimationFrame(tick);
    }).catch(() => {});
  }

  function stopTalkAnim() {
    if (talkAnimRAF) { cancelAnimationFrame(talkAnimRAF); talkAnimRAF = null; }
    if (talkAnimData) {
      const d = talkAnimData;
      drawCrewFrame(d.ctx, d.img, d.animFrames[0].frame);
    }
    talkAnimData = null;
  }

  // ── Typewriter text effect ──────────────────────────────────────
  let typewriterTimer = null;
  let typewriterSkipHandler = null;

  function stopTypewriter() {
    if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
    if (typewriterSkipHandler) {
      infoArea.removeEventListener('click', typewriterSkipHandler);
      typewriterSkipHandler = null;
    }
    const cursor = document.querySelector('.typewriter-cursor');
    if (cursor) cursor.remove();
  }

  // Current typewriter charIdx — readable externally for saving progress
  let typewriterCharIdx = 0;
  let typewriterFinished = false;

  function typewriteText(targetEl, fullHtml, startFrom, onDone) {
    stopTypewriter();

    // Convert HTML to plain text for typing
    const div = document.createElement('div');
    div.innerHTML = fullHtml;
    const fullText = div.textContent || div.innerText || '';

    const textSpan = document.createElement('span');
    const cursor = document.createElement('span');
    cursor.className = 'typewriter-cursor';
    targetEl.innerHTML = '';
    targetEl.appendChild(textSpan);
    targetEl.appendChild(cursor);

    // Pre-fill text up to startFrom
    typewriterCharIdx = startFrom || 0;
    typewriterFinished = false;
    if (typewriterCharIdx > 0) {
      textSpan.textContent = fullText.substring(0, typewriterCharIdx);
    }

    function finish() {
      if (typewriterFinished) return;
      typewriterFinished = true;
      typewriterCharIdx = fullText.length;
      if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
      cursor.remove();
      targetEl.innerHTML = fullHtml;
      if (typewriterSkipHandler) {
        infoArea.removeEventListener('click', typewriterSkipHandler);
        typewriterSkipHandler = null;
      }
      if (onDone) onDone();
    }

    // Click anywhere in info area to skip typewriter
    typewriterSkipHandler = () => finish();
    infoArea.addEventListener('click', typewriterSkipHandler);

    typewriterTimer = setInterval(() => {
      if (typewriterCharIdx < fullText.length) {
        textSpan.textContent += fullText[typewriterCharIdx];
        typewriterCharIdx++;
      } else {
        finish();
      }
    }, 33);
  }

  // ── State ───────────────────────────────────────────────────────
  const SAVE_KEY = 'space_sprout_sleuth_save';
  const BEST_KEY = 'space_sprout_sleuth_best';

  function defaultCaseState() {
    return {
      cluesFound: [],
      nodesVisited: {},      // { "crew": ["start","problem_main"], "sensors": [], ... }
      actionsTaken: [],      // ["poke_lettuce", "tasted_lettuce", ...]
      flags: [],             // ["kim_mentioned_earth", ...]
      sourceStates: {},      // { crew: { mood: 0, locked: false }, sensors: { state: "nominal" }, ... }
      wrongGuesses: 0,
      diagnosed: false,
      bonusInsights: 0,
      textProgress: {},      // clueTag → charIdx (-1 = fully read)  (kept for non-dialogue cases)
      calledHome: false,     // Phase 2: Campaign 2 "call home" hint — one use per case
      solutionIdx: -1        // Phase 5: which solution choice the player picked (Case 5 only)
    };
  }

  function defaultState() {
    return {
      playerName: 'Dr. Nova',
      currentCase: 0,
      rank: 0,
      caseState: defaultCaseState(),
      completedCases: [],
      totalScore: 0,
      // Campaign 2 foundation (Phase 1) — additive fields, default to Campaign 1 behavior
      campaign1Complete: false,
      currentCampaign: 0,
      playerSpecies: 'human'
    };
  }

  let STATE = defaultState();

  function saveState() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(STATE)); } catch(e) {}
  }

  function loadState() {
    try {
      const s = localStorage.getItem(SAVE_KEY);
      if (s) {
        const parsed = JSON.parse(s);
        // Backwards compat: default fields added in Phase 1 (Campaign 2 foundation)
        if (parsed.campaign1Complete === undefined) parsed.campaign1Complete = false;
        if (parsed.currentCampaign === undefined) parsed.currentCampaign = 0;
        if (parsed.playerSpecies === undefined) parsed.playerSpecies = 'human';
        return parsed;
      }
    } catch(e) {}
    return null;
  }

  function clearSave() {
    try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  }

  function saveBestScore(score) {
    try {
      const best = localStorage.getItem(BEST_KEY);
      if (!best || score > parseInt(best)) {
        localStorage.setItem(BEST_KEY, score);
      }
    } catch(e) {}
  }

  function getBestScore() {
    try { return parseInt(localStorage.getItem(BEST_KEY)) || 0; } catch(e) { return 0; }
  }

  // ── Screen states ───────────────────────────────────────────────
  // TITLE, BRIEFING, INVESTIGATING, CLUE_REVEAL, DIAGNOSING, WRONG_ANSWER, CORRECT_ANSWER, RANK_UP, VICTORY
  let currentScreen = 'TITLE';

  function setScreen(screen) {
    currentScreen = screen;

    // Show/hide menu bar
    menuBar.style.display = (screen === 'TITLE' || screen === 'VICTORY') ? 'none' : 'flex';

    // Show/hide action area
    const showActions = (screen === 'INVESTIGATING' || screen === 'CLUE_REVEAL');
    actionArea.style.display = showActions ? 'block' : 'none';

    // Show/hide overlays
    titleScreen.classList.toggle('hidden', screen !== 'TITLE');
    victoryScreen.classList.toggle('hidden', screen !== 'VICTORY');

    // Twinkle only on title screen
    if (screen === 'TITLE') startTwinkle(); else stopTwinkle();
    // Stop scene stars on title/victory (they restart in showBriefing)
    if (screen === 'TITLE' || screen === 'VICTORY') stopSceneFx();

    // Update menu bar
    if (screen !== 'TITLE' && screen !== 'VICTORY') {
      menuRank.textContent = GAME_DATA.ranks[STATE.rank];
      menuRank.style.color = getActiveRankColors()[STATE.rank] || '#06b6d4';
      menuCase.textContent = 'Case ' + caseDisplayLabel(STATE.currentCase) + ' of ' + caseDisplayTotal();
      $('game-title-bar').textContent = STATE.currentCampaign === 1
        ? 'Space Sprout Sleuth: Distant Soils'
        : 'Space Sprout Sleuth';
    }
  }

  // ── Dialogue Engine ──────────────────────────────────────────────

  // Which source is currently active (e.g. "crew", "sensors")
  let activeSourceKey = null;
  let activeDialogueNodeId = null;  // tracks current node for text progress

  // Initialize source states for a case (called once at investigation start)
  function initSourceStates() {
    const caseData = GAME_DATA.cases[STATE.currentCase];
    if (!caseData.sources) return;
    const cs = STATE.caseState;
    if (!cs.sourceStates || !Object.keys(cs.sourceStates).length) {
      cs.sourceStates = {};
      for (const key of Object.keys(caseData.sources)) {
        const src = caseData.sources[key];
        if (src.type === 'conversation') {
          cs.sourceStates[key] = { mood: src.startMood || 0, locked: false };
        } else if (src.type === 'terminal') {
          cs.sourceStates[key] = { state: src.startState || 'nominal' };
        } else if (src.type === 'archive') {
          cs.sourceStates[key] = { access: src.startAccess || 'standard' };
        } else {
          cs.sourceStates[key] = {};
        }
      }
    }
    if (!cs.nodesVisited || !Object.keys(cs.nodesVisited).length) {
      cs.nodesVisited = {};
      for (const key of Object.keys(caseData.sources)) {
        cs.nodesVisited[key] = [];
      }
    }
    if (!cs.actionsTaken) cs.actionsTaken = [];
    if (!cs.flags) cs.flags = [];
    if (cs.bonusInsights === undefined) cs.bonusInsights = 0;
  }

  // Get mood label from numeric value
  function getMoodLabel(moodValue, personality) {
    const p = GAME_DATA.personalities[personality] || GAME_DATA.personalities.patient;
    if (p.lockThreshold !== null && moodValue <= -p.lockThreshold) return 'angry';
    if (moodValue <= -p.annoyThreshold) return 'annoyed';
    if (moodValue >= 2) return 'friendly';
    return 'neutral';
  }

  // Map mood labels to alien portrait filenames (curious personality)
  const ALIEN_MOOD_PORTRAITS = {
    neutral:  'portrait_alien_neutral.png',
    friendly: 'portrait_alien_intrigued.png',
    grateful: 'portrait_alien_grateful.png',
    annoyed:  'portrait_alien_confused.png',
    angry:    'portrait_alien_confused.png'
  };

  // Update alien portrait canvas to reflect current mood or node override
  function updateAlienPortrait(sourceKey, node) {
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const source = caseData.sources[sourceKey];
    if (!source || source.personality !== 'curious') return;
    const clue = caseData.clues.find(c => c.action === sourceKey);
    if (!clue || !clue.sprites || !clue.sprites.alienPortrait) return;

    // Node-level override takes priority (narrative-driven portrait)
    let frameName;
    if (node && node.portraitOverride) {
      frameName = node.portraitOverride;
    } else {
      const cs = STATE.caseState;
      const srcState = cs.sourceStates[sourceKey];
      if (!srcState) return;
      const mood = getMoodLabel(srcState.mood, source.personality);
      frameName = ALIEN_MOOD_PORTRAITS[mood] || 'portrait_alien_neutral.png';
    }

    const canvas = document.getElementById('portrait-canvas');
    if (canvas && alienSheetData) {
      drawAlienFrame(canvas, frameName);
    }

    // Also update the mood dot in the speaker header
    const moodDot = document.querySelector('.mood-dot');
    const newMoodHtml = getMoodIndicatorHtml(sourceKey, source);
    const nameEl = document.querySelector('.speaker-name');
    if (nameEl) {
      if (moodDot) moodDot.remove();
      if (newMoodHtml) nameEl.insertAdjacentHTML('beforeend', newMoodHtml);
    }
  }

  // Check if a single requirement is met
  function checkRequirement(req) {
    const cs = STATE.caseState;
    if (req.clueFound) {
      return cs.cluesFound.includes(req.clueFound);
    }
    if (req.nodeVisited) {
      // Format: "source.nodeId"
      const [src, nodeId] = req.nodeVisited.split('.');
      return cs.nodesVisited[src] && cs.nodesVisited[src].includes(nodeId);
    }
    if (req.actionTaken) {
      return cs.actionsTaken.includes(req.actionTaken);
    }
    if (req.flagSet) {
      return cs.flags.includes(req.flagSet);
    }
    if (req.moodIsNot) {
      // "angry" — check active source mood
      const srcState = cs.sourceStates[activeSourceKey];
      if (!srcState) return true;
      const caseData = GAME_DATA.cases[STATE.currentCase];
      const src = caseData.sources[activeSourceKey];
      const currentMood = getMoodLabel(srcState.mood, src.personality);
      return currentMood !== req.moodIsNot;
    }
    if (req.stateIs) {
      const [src, state] = req.stateIs.split('.');
      return cs.sourceStates[src] && cs.sourceStates[src].state === state;
    }
    // Campaign 2 (Phase 1): player species checks for cross-campaign dialogue gating.
    // playerSpecies: "alien" matches any non-human; otherwise exact match.
    if (req.playerSpecies) {
      if (req.playerSpecies === 'alien') return STATE.playerSpecies !== 'human';
      return STATE.playerSpecies === req.playerSpecies;
    }
    if (req.playerSpeciesNot) {
      if (req.playerSpeciesNot === 'human') return STATE.playerSpecies !== 'human';
      return STATE.playerSpecies !== req.playerSpeciesNot;
    }
    return true;
  }

  // Check if all requirements for an option are met
  function meetsRequirements(option) {
    if (!option.requires) return true;
    // requires can be an object with one or more conditions (all must pass)
    const req = option.requires;
    for (const key of Object.keys(req)) {
      if (!checkRequirement({ [key]: req[key] })) return false;
    }
    return true;
  }

  // Apply node effects (clue reveal, mood shift, flags, actions, etc.)
  function applyNodeEffects(node, sourceKey) {
    const cs = STATE.caseState;
    const caseData = GAME_DATA.cases[STATE.currentCase];

    // Track node visit (determine if first visit before marking)
    if (!cs.nodesVisited[sourceKey]) cs.nodesVisited[sourceKey] = [];
    const nodeId = Object.keys(caseData.sources[sourceKey].nodes).find(
      k => caseData.sources[sourceKey].nodes[k] === node
    );
    const firstVisit = nodeId && !cs.nodesVisited[sourceKey].includes(nodeId);
    if (firstVisit) {
      cs.nodesVisited[sourceKey].push(nodeId);
    }

    // Reveal clue (idempotent — only adds once)
    if (node.revealsClue && !cs.cluesFound.includes(node.revealsClue)) {
      cs.cluesFound.push(node.revealsClue);
    }

    // Bonus insight + mood shift only on first visit (prevent double-counting)
    if (firstVisit) {
      if (node.bonusInsight) {
        cs.bonusInsights = (cs.bonusInsights || 0) + 1;
      }
      if (node.moodShift !== undefined && cs.sourceStates[sourceKey] && cs.sourceStates[sourceKey].mood !== undefined) {
        cs.sourceStates[sourceKey].mood += node.moodShift;
      }
    }

    // Set mood directly
    if (node.setMood !== undefined && cs.sourceStates[sourceKey]) {
      const src = caseData.sources[sourceKey];
      if (node.setMood === 'neutral') {
        cs.sourceStates[sourceKey].mood = 0;
      } else if (node.setMood === 'annoyed') {
        const p = GAME_DATA.personalities[src.personality] || GAME_DATA.personalities.patient;
        cs.sourceStates[sourceKey].mood = Math.min(cs.sourceStates[sourceKey].mood, -p.annoyThreshold);
      } else if (node.setMood === 'angry') {
        const p = GAME_DATA.personalities[src.personality] || GAME_DATA.personalities.patient;
        cs.sourceStates[sourceKey].mood = -(p.lockThreshold || 5);
      }
    }

    // Lock/unlock source
    if (node.locksSource !== undefined && cs.sourceStates[sourceKey]) {
      cs.sourceStates[sourceKey].locked = node.locksSource;
    }

    // Set flag
    if (node.setsFlag && !cs.flags.includes(node.setsFlag)) {
      cs.flags.push(node.setsFlag);
    }

    // Set action
    if (node.setsAction && !cs.actionsTaken.includes(node.setsAction)) {
      cs.actionsTaken.push(node.setsAction);
    }

    saveState();
  }

  // Get the node to start a source conversation on
  function getStartNode(sourceKey) {
    const cs = STATE.caseState;
    const srcState = cs.sourceStates[sourceKey];
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const source = caseData.sources[sourceKey];

    // If locked and has a locked node, show that
    if (srcState && srcState.locked && source.nodes.locked) {
      return 'locked';
    }

    // Always restart at 'start' (conditional options reflect learned state)
    return 'start';
  }

  // Render a dialogue node into the info area
  function renderDialogueNode(sourceKey, nodeId) {
    saveTextProgress();
    stopTalkAnim();
    stopTypewriter();

    activeSourceKey = sourceKey;
    activeDialogueNodeId = nodeId;
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const source = caseData.sources[sourceKey];
    const node = source.nodes[nodeId];
    if (!node) { showFieldNotes(); return; }

    // Apply effects
    applyNodeEffects(node, sourceKey);

    // Update alien portrait if mood changed or node overrides it
    updateAlienPortrait(sourceKey, node);

    // Check if conversation ends — show exit button instead of auto-return
    if (node.endsConversation) {
      const exitLabel = node.exitLabel || 'Back';
      const exitOption = [{ label: exitLabel, goto: '__exit__' }];
      renderDialogueText(source, node, exitOption, sourceKey, nodeId);
      updateActionButtons();
      return;
    }

    // Filter options
    const visibleOptions = (node.options || []).filter(meetsRequirements);

    // Render with typewriter
    renderDialogueText(source, node, visibleOptions, sourceKey, nodeId);
    updateActionButtons();
  }

  // ── Translator degradation (confused Zel'keth) ────────────────
  const TRANSLATOR_GLITCHES = [
    '[TRANSLATOR: signal unclear]',
    '[TRANSLATOR ERROR: meaning lost]',
    '[TRANSLATOR: recalibrating...]',
    '[SIGNAL DEGRADED]',
    '[TRANSLATOR: ??? ]',
    '[TRANSLATOR: concept not found]',
    '[PARTIAL TRANSLATION]',
  ];

  function degradeTranslatorText(text) {
    // Insert glitch fragments between sentences
    const sentences = text.split(/(?<=[.!?])\s+/);
    if (sentences.length <= 1) return text;
    const result = [];
    for (let i = 0; i < sentences.length; i++) {
      result.push(sentences[i]);
      // ~40% chance of inserting a glitch after each sentence
      if (i < sentences.length - 1 && Math.random() < 0.4) {
        const glitch = TRANSLATOR_GLITCHES[Math.random() * TRANSLATOR_GLITCHES.length | 0];
        result.push(glitch);
      }
    }
    return result.join(' ');
  }

  // Build HTML for dialogue text + options, with typewriter effect
  function renderDialogueText(source, node, options, sourceKey, nodeId) {
    const isPreformatted = (source.type === 'terminal' || source.type === 'archive');

    // Degrade translator for confused alien crew
    let nodeText = node.text;
    if (source.personality === 'curious' && sourceKey === 'crew') {
      const cs = STATE.caseState;
      const srcState = cs.sourceStates[sourceKey];
      if (srcState) {
        const mood = getMoodLabel(srcState.mood, source.personality);
        if (mood === 'annoyed') nodeText = degradeTranslatorText(nodeText);
      }
    }

    // Keep \n in the text — the target element uses white-space:pre-line so
    // line breaks render correctly DURING typewriter animation, not just after.
    const textHtml = escHtml(nodeText);
    let textClass = 'info-body';
    if (isPreformatted) textClass = 'terminal-text';
    else if (source.type === 'examination') textClass = 'info-body prose-text';

    // Build clue extract HTML if this node reveals a clue
    let clueHtml = '';
    if (node.revealsClue) {
      const caseData = GAME_DATA.cases[STATE.currentCase];
      const clue = caseData.clues.find(c => c.clueTag === node.revealsClue);
      if (clue) {
        clueHtml = '<div class="clue-extract">' +
          '<div class="clue-extract-label">Clue Discovered</div>' +
          escHtml(clue.learned) +
          '</div>';
      }
    }

    // Build options HTML
    let optionsHtml = '';
    if (options.length) {
      optionsHtml = '<div class="dialogue-options">';
      options.forEach((opt, i) => {
        const cls = opt.isAction ? ' is-action' : '';
        optionsHtml += '<div class="dialogue-option' + cls + '" data-opt-idx="' + i + '">' +
          escHtml(opt.label) + '</div>';
      });
      optionsHtml += '</div>';
    }

    // Check text progress for this node
    if (!STATE.caseState.textProgress) STATE.caseState.textProgress = {};
    const progressKey = sourceKey + '.' + nodeId;
    const progress = STATE.caseState.textProgress[progressKey];
    const fullyRead = (progress === -1);

    // Get the clue data for talk anim
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const clueForAnim = caseData.clues.find(c => c.action === sourceKey);

    if (fullyRead) {
      // Already fully read — show everything instantly
      typewriterFinished = true;
      renderInfo(
        '<div class="' + textClass + '"><p style="white-space:pre-line;">' + textHtml + '</p></div>' +
        clueHtml + optionsHtml
      );
      bindDialogueOptionClicks(options);
      return;
    }

    // Typewriter mode — hide options and clue until typing finishes
    const startFrom = (typeof progress === 'number' && progress > 0) ? progress : 0;
    const afterHtml = clueHtml + optionsHtml;

    renderInfo(
      '<div class="' + textClass + '"><p id="dialogue-text-target" style="white-space:pre-line;"></p></div>' +
      '<div id="dialogue-after-text" style="display:none">' + afterHtml + '</div>'
    );

    // Start talk animation for crew
    // Start talk animation for any source that has a spritesheet (not just 'crew').
    // Case 6 has 4 character sources that all need mouth animation.
    if (clueForAnim && clueForAnim.sprites && clueForAnim.sprites.spritesheet) {
      startTalkAnim(clueForAnim);
    }

    const textTarget = document.getElementById('dialogue-text-target');
    const afterText = document.getElementById('dialogue-after-text');
    if (textTarget) {
      typewriteText(textTarget, textHtml, startFrom, () => {
        // Typing finished
        stopTalkAnim();
        if (afterText) afterText.style.display = '';
        bindDialogueOptionClicks(options);
        // Mark fully read
        STATE.caseState.textProgress[progressKey] = -1;
        saveState();
      });
    }
  }

  // Bind click handlers to dialogue option elements
  function bindDialogueOptionClicks(options) {
    infoArea.querySelectorAll('.dialogue-option').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation(); // prevent bubbling to infoArea's typewriter skip handler
        const idx = parseInt(el.dataset.optIdx);
        const opt = options[idx];
        if (opt && opt.goto === '__exit__') {
          showFieldNotes();
        } else if (opt && opt.goto) {
          renderDialogueNode(activeSourceKey, opt.goto);
        }
      });
    });
  }

  // Enter a source's dialogue tree
  function enterSource(sourceKey) {
    const caseData = GAME_DATA.cases[STATE.currentCase];
    if (!caseData.sources || !caseData.sources[sourceKey]) return;

    // Save scroll before leaving
    if (currentScreen === 'INVESTIGATING') {
      fieldNotesScroll = infoArea.scrollTop;
    }
    saveTextProgress();
    stopTalkAnim();
    stopTypewriter();

    setScreen('CLUE_REVEAL');
    activeSourceKey = sourceKey;

    const source = caseData.sources[sourceKey];
    const clue = caseData.clues.find(c => c.action === sourceKey);

    // Speaker header
    const moodHtml = getMoodIndicatorHtml(sourceKey, source);
    speakerBar.innerHTML =
      '<div class="speaker-header">' +
        portraitHtml(clue) +
        '<div class="speaker-info">' +
          '<div class="speaker-name">' + escHtml(source.speaker) + moodHtml + '</div>' +
          '<div class="speaker-role">' + escHtml(clue ? ((caseData.actionLabels && caseData.actionLabels[clue.action]) || clue.label) : '') + '</div>' +
        '</div>' +
        '<span class="back-link" onclick="SSS.showFieldNotes()">← Field Notes</span>' +
      '</div>';

    // Draw portrait
    const portraitCanvas = document.getElementById('portrait-canvas');
    if (portraitCanvas && clue && clue.sprites) {
      if (portraitCanvas.dataset.alienFrame) {
        drawAlienFrame(portraitCanvas, portraitCanvas.dataset.alienFrame);
      } else if (clue.sprites.spritesheet) {
        loadSpritesheet(clue.sprites.spritesheet, clue.sprites.spritesheetJson).then(data => {
          const ctx = portraitCanvas.getContext('2d');
          ctx.imageSmoothingEnabled = false;
          drawCrewFrame(ctx, data.img, data.frames[0].frame);
        }).catch(() => {});
      } else if (portraitCanvas.dataset.uiFrame) {
        drawUiFrame(portraitCanvas, portraitCanvas.dataset.uiFrame);
      }
    }

    // Enter the tree (talk anim is started by renderDialogueText)
    const startNodeId = getStartNode(sourceKey);
    renderDialogueNode(sourceKey, startNodeId);
  }

  // Build mood/state indicator HTML for speaker header
  function getMoodIndicatorHtml(sourceKey, source) {
    const cs = STATE.caseState;
    const srcState = cs.sourceStates[sourceKey];
    if (!srcState) return '';

    if (source.type === 'conversation') {
      const mood = getMoodLabel(srcState.mood, source.personality);
      if (mood === 'neutral') return '';
      return '<span class="mood-dot ' + mood + '" title="' + mood + '"></span>';
    }

    if (source.type === 'terminal') {
      const state = srcState.state || 'nominal';
      return '<span class="source-state ' + state + '"> ' + state.toUpperCase() + '</span>';
    }

    return '';
  }

  // ── Scoring ─────────────────────────────────────────────────────
  function calculateCaseScore() {
    const cs = STATE.caseState;
    const currentCaseData = GAME_DATA.cases[STATE.currentCase];
    const totalClues = currentCaseData.clues.length;

    let score = 100;
    if (cs.cluesFound.length >= totalClues) score += 25;
    score -= cs.wrongGuesses * 20;

    // V2 dialogue bonuses
    if (currentCaseData.sources) {
      // Insight bonus: +5 per cross-source "connected the dots" moment
      score += (cs.bonusInsights || 0) * 5;

      // Perfect rapport: +10 if no crew was annoyed or locked
      let perfectRapport = true;
      for (const key of Object.keys(currentCaseData.sources)) {
        const src = currentCaseData.sources[key];
        if (src.type === 'conversation' && cs.sourceStates[key]) {
          const mood = getMoodLabel(cs.sourceStates[key].mood, src.personality);
          if (mood === 'annoyed' || mood === 'angry') perfectRapport = false;
        }
      }
      if (perfectRapport) score += 10;

      // Thoroughness: +5 per source where all nodes were visited
      for (const key of Object.keys(currentCaseData.sources)) {
        const totalNodes = Object.keys(currentCaseData.sources[key].nodes).length;
        const visited = (cs.nodesVisited[key] || []).length;
        if (visited >= totalNodes) score += 5;
      }
    }

    return Math.max(score, 20);
  }

  // ── Rendering helpers ───────────────────────────────────────────
  function renderInfo(html) {
    infoArea.innerHTML = html;
    infoArea.classList.remove('fade-in');
    void infoArea.offsetWidth; // reflow
    infoArea.classList.add('fade-in');
    infoArea.scrollTop = 0;
  }

  // Get button status for a clue source: 'found', 'visited', 'locked', or ''
  function getSourceStatus(clue) {
    const cs = STATE.caseState;
    const found = cs.cluesFound.includes(clue.clueTag);
    if (found) return 'found';

    const caseData = GAME_DATA.cases[STATE.currentCase];
    if (caseData.sources && caseData.sources[clue.action]) {
      const srcState = cs.sourceStates[clue.action];
      if (srcState && srcState.locked) return 'locked';
      if (cs.nodesVisited[clue.action] && cs.nodesVisited[clue.action].length > 0) return 'visited';
    }
    return '';
  }

  function updateActionButtons(fullRebuild) {
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const inC2 = STATE.currentCampaign === 1;

    if (fullRebuild || !actionGrid.children.length) {
      // Full rebuild — only on first render or screen transitions.
      // Phase 2: for Campaign 2, move Diagnose into the grid as the 6th cell.
      // Re-parent to actionArea first so innerHTML='' on the grid can't wipe
      // the diagnose element (preserving its click listener). Only touch the
      // parent on full rebuild so lightweight updates (called on every
      // dialogue node render) don't bounce diagnose around.
      actionArea.classList.toggle('campaign-2', inC2);
      if (diagnoseBtn.parentNode === actionGrid) {
        actionArea.appendChild(diagnoseBtn);
      }
      actionGrid.innerHTML = '';
      caseData.clues.forEach(clue => {
        const status = getSourceStatus(clue);
        const btn = document.createElement('button');
        btn.className = 'action-btn' + (status ? ' ' + status : '') + (clue.action === 'database' ? ' database-btn' : '');
        btn.dataset.clueTag = clue.clueTag;
        const statusIcon = status === 'found' ? '<span class="check">\u2713</span>'
          : status === 'visited' ? '<span class="check visited-icon">\u2022</span>'
          : '';
        const btnLabel = (caseData.actionLabels && caseData.actionLabels[clue.action]) || clue.label;
        btn.innerHTML = actionIconHtml(clue) + ' ' + btnLabel + statusIcon;
        btn.addEventListener('click', () => showClue(clue));
        actionGrid.appendChild(btn);
      });
      if (inC2) actionGrid.appendChild(diagnoseBtn);
      fillActionIcons();
    } else {
      // Lightweight update — toggle found/visited/locked state on existing buttons
      caseData.clues.forEach(clue => {
        const status = getSourceStatus(clue);
        const btn = actionGrid.querySelector('[data-clue-tag="' + clue.clueTag + '"]');
        if (!btn) return;
        btn.className = 'action-btn' + (status ? ' ' + status : '');
        // Update status icon
        let existingCheck = btn.querySelector('.check');
        if (status === 'found') {
          if (!existingCheck) { existingCheck = document.createElement('span'); btn.appendChild(existingCheck); }
          existingCheck.className = 'check';
          existingCheck.textContent = '\u2713';
        } else if (status === 'locked') {
          if (existingCheck) existingCheck.remove();
        } else if (status === 'visited') {
          if (!existingCheck) { existingCheck = document.createElement('span'); btn.appendChild(existingCheck); }
          existingCheck.className = 'check visited-icon';
          existingCheck.textContent = '\u2022';
        } else if (existingCheck) {
          existingCheck.remove();
        }
      });
    }

    const allFound = STATE.caseState.cluesFound.length >= caseData.clues.length;
    diagnoseBtn.classList.toggle('pulse', allFound);
  }

  // ── Screen renderers ────────────────────────────────────────────

  let lastLoadedCase = -1;

  function loadScene(caseData, caseIdx) {
    // Update location
    locationName.textContent = caseData.name;
    locationSub.textContent = caseData.location + ' \u2014 ' + caseData.subtitle;

    // Apply palette to scene
    sceneWrap.style.background = caseData.palette.bg;

    // Scene window effects (stars through porthole, dust on Mars, etc.)
    if (caseData.sceneWindow || caseData.sceneFx) {
      startSceneFx(caseData);
    } else {
      stopSceneFx();
    }

    // Load PNG scene
    sceneImg.classList.remove('loaded', 'scene-fade');
    sceneImg.style.opacity = '';
    const scenePath = caseData.sprites && caseData.sprites.scene;
    if (scenePath) {
      tryLoadImg(sceneImg, scenePath).then(ok => {
        if (ok) sceneImg.classList.add('loaded');
      });
    }

    lastLoadedCase = caseIdx;
  }

  function showBriefing() {
    saveTextProgress();
    speakerBar.innerHTML = '';
    const caseData = GAME_DATA.cases[STATE.currentCase];
    setScreen('BRIEFING');

    const needsTransition = lastLoadedCase >= 0 && lastLoadedCase !== STATE.currentCase;

    if (needsTransition) {
      // Glitch the location text while static plays
      const newName = caseData.name;
      const newSub = caseData.location + ' \u2014 ' + caseData.subtitle;
      glitchText(locationName, newName, { duration: 550 });
      glitchText(locationSub, newSub, { duration: 600 });

      // Static burst covers old scene, load new scene behind it, then reveal
      playStaticTransition(350, null);
      setTimeout(() => loadScene(caseData, STATE.currentCase), 150);
    } else {
      loadScene(caseData, STATE.currentCase);
    }

    // Connection screen for first contact cases
    if (caseData.connectionScreen) {
      startConnectionScreen();
    } else {
      stopConnectionScreen();
    }

    // Phase 2: Campaign 2 briefings show Nova + Zel'keth handler portraits
    const handlersHtml = (STATE.currentCampaign === 1)
      ? '<div class="briefing-handlers">' +
          '<div class="handler-portrait">' +
            '<canvas id="briefing-nova" width="96" height="96"></canvas>' +
            '<div class="handler-name">Dr. Nova</div>' +
          '</div>' +
          '<div class="handler-portrait">' +
            '<canvas id="briefing-zelketh" width="96" height="96"></canvas>' +
            '<div class="handler-name">Zel\'keth</div>' +
          '</div>' +
        '</div>'
      : '';

    if (caseData.connectionScreen) {
      // Connection screen cases: show pulsing header, delay briefing until
      // the connection animation completes, then typewrite the text in.
      // Use \n with white-space:pre-line so line breaks render DURING typing
      // (the typewriter strips HTML tags, so <br> would collapse until finish).
      const briefingText = escHtml(caseData.briefing);
      renderInfo(
        '<div class="info-header cyan briefing-header-pulse">Incoming Dispatch</div>' +
        '<div class="info-body"><p id="briefing-text-target" style="white-space:pre-line;"></p></div>' +
        '<div id="briefing-after-text" style="display:none">' +
          '<button class="retro-btn accent" onclick="SSS.beginInvestigation()">Begin Investigation \u2192</button>' +
        '</div>'
      );

      const connDelay = 300 + CONN_LINES.length * 250 + 1000;
      setTimeout(() => {
        const header = infoArea.querySelector('.briefing-header-pulse');
        if (header) header.classList.remove('briefing-header-pulse');
        const textTarget = document.getElementById('briefing-text-target');
        const afterText = document.getElementById('briefing-after-text');
        if (textTarget) {
          typewriteText(textTarget, briefingText, 0, () => {
            if (afterText) afterText.style.display = '';
          });
        }
      }, connDelay);
    } else {
      renderInfo(
        '<div class="info-header cyan">Incoming Dispatch</div>' +
        handlersHtml +
        '<div class="info-body"><p>' + escHtml(caseData.briefing).replace(/\n/g, '<br>') + '</p></div>' +
        '<button class="retro-btn accent" onclick="SSS.beginInvestigation()">Begin Investigation \u2192</button>'
      );
    }

    // Draw handler portraits after DOM insert
    if (STATE.currentCampaign === 1) {
      const novaCanvas = document.getElementById('briefing-nova');
      if (novaCanvas) {
        // Case 6 (bonus): Nova is physically present — use unmasked portrait
        const caseData = GAME_DATA.cases[STATE.currentCase];
        const novaSheet = (caseData && caseData.isBonus)
          ? 'sprites_c2/nova/spritesheet_unmasked.png'
          : 'sprites_c2/nova/spritesheet.png';
        const novaJson = (caseData && caseData.isBonus)
          ? 'sprites_c2/nova/spritesheet_unmasked.json'
          : 'sprites_c2/nova/spritesheet.json';
        loadSpritesheet(novaSheet, novaJson)
          .then(data => {
            const ctx = novaCanvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            drawCrewFrame(ctx, data.img, data.frames[data.frames.length - 1].frame);
          }).catch(() => {});
      }
      const zelCanvas = document.getElementById('briefing-zelketh');
      if (zelCanvas) {
        if (alienSheetData) {
          drawAlienFrame(zelCanvas, 'portrait_alien_neutral.png');
        } else {
          loadAlienSheet().then(() => drawAlienFrame(zelCanvas, 'portrait_alien_neutral.png'));
        }
      }
    }
  }

  function beginInvestigation() {
    stopConnectionScreen();
    setScreen('INVESTIGATING');
    fieldNotesScroll = 0;
    initSourceStates();
    updateActionButtons(true);
    showFieldNotes();
  }

  // ── Connection screen (DOS/Matrix typing for Case 6 briefing) ───
  const connScreenEl = $('connection-screen');
  let connTimers = [];
  const CONN_LINES = [
    'SOLAR AGRICULTURAL AUTHORITY',
    'SECURE CHANNEL v4.2.1',
    '',
    '> INITIATING CONTACT PROTOCOL...',
    '> SCANNING FREQUENCY BANDS......... OK',
    '> ALIEN VESSEL DETECTED AT L2 HAYES',
    '> TRANSLATING PROTOCOLS...',
    '',
    '  [████████████████████░░░░] 78%',
    '  [█████████████████████░░░] 84%',
    '  [████████████████████████] 100%',
    '',
    '> TRANSLATION MATRIX LOADED',
    '> ATMOSPHERIC BRIDGE: ACTIVE',
    '> BIOLOGICAL SCAN: NON-HOSTILE',
    '',
    '> ESTABLISHING SECURE CHANNEL...',
    '',
    '  ▓▓▓ SIGNAL LOCKED ▓▓▓',
    '',
    '> READY FOR DIPLOMATIC EXCHANGE',
    '> AWAITING FIELD AGENT...',
  ];

  function startConnectionScreen() {
    connScreenEl.classList.remove('hidden');
    connScreenEl.innerHTML = '';
    connTimers.forEach(clearTimeout);
    connTimers = [];

    CONN_LINES.forEach((line, i) => {
      const el = document.createElement('div');
      el.className = 'conn-line';
      if (!line) { el.innerHTML = '&nbsp;'; }
      else { el.textContent = line; }
      connScreenEl.appendChild(el);

      connTimers.push(setTimeout(() => {
        el.classList.add('visible');
        // Dim older lines to create scrolling feel
        const all = connScreenEl.querySelectorAll('.conn-line.visible');
        if (all.length > 10) {
          for (let j = 0; j < all.length - 10; j++) all[j].classList.add('dim');
        }
      }, 300 + i * 250));
    });

    // After all lines typed, loop with cursor blink
    const loopStart = 300 + CONN_LINES.length * 250 + 1000;
    connTimers.push(setTimeout(() => {
      const cursor = document.createElement('div');
      cursor.className = 'conn-line visible';
      cursor.innerHTML = '> <span class="conn-cursor">_</span>';
      connScreenEl.appendChild(cursor);
    }, loopStart));
  }

  function stopConnectionScreen() {
    connTimers.forEach(clearTimeout);
    connTimers = [];
    connScreenEl.classList.add('hidden');
    connScreenEl.innerHTML = '';
  }

  // Phase 2: "Call Home" — one-use hint per case. Shows a stub message from
  // Nova/Zel'keth based on how many clues the player has found. Real per-case
  // hint scripts come in Phase 3; this just proves the wiring.
  function callHome() {
    if (STATE.currentCampaign !== 1) return;
    if (STATE.caseState.calledHome) return;
    STATE.caseState.calledHome = true;
    saveState();

    const found = STATE.caseState.cluesFound.length;
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const total = caseData.clues.length;
    const hints = caseData.callHomeHints;
    let hint;
    if (found >= total) {
      hint = (hints && hints.full) || "You have everything you need. What\u2019s the diagnosis?";
    } else if (found >= 2) {
      hint = (hints && hints.mid) || "You\u2019re getting close. Check the sources you haven\u2019t visited yet \u2014 the answer is in the gaps.";
    } else {
      hint = (hints && hints.low) || "Take your time. Talk to the crew, check the sensors, examine the plants. The clues are there.";
    }

    stopTalkAnim();
    stopTypewriter();

    const novaClue = {
      icon: '\ud83d\udce1',
      sprites: {
        spritesheet:     'sprites_c2/nova/spritesheet.png',
        spritesheetJson: 'sprites_c2/nova/spritesheet.json'
      }
    };

    speakerBar.innerHTML =
      '<div class="speaker-header">' +
        portraitHtml(novaClue) +
        '<div class="speaker-info">' +
          '<div class="speaker-name">Dr. Nova</div>' +
          '<div class="speaker-role">Remote Handler</div>' +
        '</div>' +
        '<span class="back-link" onclick="SSS.showFieldNotes()">\u2190 Field Notes</span>' +
      '</div>';

    const portraitCanvas = document.getElementById('portrait-canvas');
    if (portraitCanvas) {
      loadSpritesheet(novaClue.sprites.spritesheet, novaClue.sprites.spritesheetJson)
        .then(data => {
          const ctx = portraitCanvas.getContext('2d');
          ctx.imageSmoothingEnabled = false;
          drawCrewFrame(ctx, data.img, data.frames[0].frame);
        }).catch(() => {});
    }

    const optionsHtml = '<div class="dialogue-options">' +
      '<div class="dialogue-option" data-opt-idx="0">\u2190 Back to Field Notes</div>' +
      '</div>';

    renderInfo(
      '<div class="info-body"><p id="dialogue-text-target"></p></div>' +
      '<div id="dialogue-after-text" style="display:none">' + optionsHtml + '</div>'
    );

    // Defer typewriter start so the current click event (from the Call Home
    // button inside infoArea) finishes propagating before the typewriter's
    // skip-on-click handler is attached. Without this, the original click
    // bubbles to infoArea and immediately skips the typewriter.
    setTimeout(() => {
      startTalkAnim(novaClue);

      const textTarget = document.getElementById('dialogue-text-target');
      const afterText = document.getElementById('dialogue-after-text');
      if (textTarget) {
        typewriteText(textTarget, escHtml(hint), 0, () => {
          stopTalkAnim();
          if (afterText) afterText.style.display = '';
          infoArea.querySelectorAll('.dialogue-option').forEach(el => {
            el.addEventListener('click', e => {
              e.stopPropagation();
              showFieldNotes();
            });
          });
        });
      }
    }, 0);
  }

  function showFieldNotes() {
    saveTextProgress();
    stopTalkAnim();
    activeSourceKey = null;
    activeDialogueNodeId = null;
    stopTypewriter();
    speakerBar.innerHTML = '';
    setScreen('INVESTIGATING');
    const cs = STATE.caseState;
    const caseData = GAME_DATA.cases[STATE.currentCase];

    // Phase 2: "Call Home" hint button — Campaign 2 only, once per case
    // Call home button — Campaign 2 only, hidden if the case has no hints (Case 6: we are home)
    const caseHints = GAME_DATA.cases[STATE.currentCase] && GAME_DATA.cases[STATE.currentCase].callHomeHints;
    const callHomeHtml = (STATE.currentCampaign === 1 && caseHints)
      ? '<span class="call-home-btn' + (cs.calledHome ? ' used' : '') + '" onclick="SSS.callHome()">\ud83d\udce1 Call Home</span>'
      : '';

    let html = '<div class="info-header cyan">' + callHomeHtml + '\ud83d\udcd3 Field Notes</div>';

    if (cs.cluesFound.length === 0) {
      html += '<div class="info-body"><p>No clues yet. Start investigating!</p></div>';
    } else {
      // Newest first — reverse the order clues were found
      const clueMap = {};
      caseData.clues.forEach(c => { clueMap[c.clueTag] = c; });
      for (let i = cs.cluesFound.length - 1; i >= 0; i--) {
        const clue = clueMap[cs.cluesFound[i]];
        if (!clue) continue;
        html += '<div class="field-note">' +
          '<span class="field-note-icon">' + actionIconHtml(clue) + '</span>' +
          '<span class="field-note-text">' + escHtml(clue.learned) + '</span>' +
          '</div>';
      }
    }

    renderInfo(html);
    infoArea.scrollTop = fieldNotesScroll;
    fillActionIcons();
    updateActionButtons(true);
  }

  let fieldNotesScroll = 0;

  // Save current typewriter position before navigating away
  function saveTextProgress() {
    if (!activeSourceKey || !activeDialogueNodeId) return;
    if (!STATE.caseState.textProgress) STATE.caseState.textProgress = {};
    const key = activeSourceKey + '.' + activeDialogueNodeId;
    STATE.caseState.textProgress[key] = typewriterFinished ? -1 : typewriterCharIdx;
    saveState();
  }

  function showClue(clue) {
    enterSource(clue.action);
  }

  function showDiagnosis() {
    saveTextProgress();
    stopTalkAnim();
    stopTypewriter();
    speakerBar.innerHTML = '';
    setScreen('DIAGNOSING');
    const caseData = GAME_DATA.cases[STATE.currentCase];

    let html = '<span class="back-link" onclick="SSS.showFieldNotes()">\u2190 Back</span>' +
      '<div class="info-header cyan">What\'s the Problem?</div>';

    caseData.diagnoses.forEach((d, i) => {
      html += '<div class="diagnosis-option" data-idx="' + i + '" onclick="SSS.selectDiagnosis(' + i + ')">' +
        escHtml(d.label) + '</div>';
    });

    html += '<button id="confirm-btn" class="retro-btn accent disabled" onclick="SSS.confirmDiagnosis()">Confirm Diagnosis</button>';

    renderInfo(html);
  }

  let selectedDiagnosis = -1;

  function selectDiagnosis(idx) {
    selectedDiagnosis = idx;
    // Update UI
    const opts = infoArea.querySelectorAll('.diagnosis-option');
    opts.forEach((o, i) => o.classList.toggle('selected', i === idx));
    const btn = infoArea.querySelector('#confirm-btn');
    if (btn) btn.classList.remove('disabled');
  }

  function confirmDiagnosis() {
    if (selectedDiagnosis < 0) return;
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const choice = caseData.diagnoses[selectedDiagnosis];

    if (choice.isCorrect) {
      showCorrectAnswer();
    } else {
      STATE.caseState.wrongGuesses++;
      saveState();
      showWrongAnswer(choice);
    }

    selectedDiagnosis = -1;
  }

  function showWrongAnswer(choice) {
    setScreen('WRONG_ANSWER');
    const game = $('game');
    game.classList.remove('shake');
    void game.offsetWidth;
    game.classList.add('shake');
    game.addEventListener('animationend', () => game.classList.remove('shake'), { once: true });
    renderInfo(
      '<div class="info-header red">Not Quite...</div>' +
      '<div class="info-body"><p style="color:#555;">' + escHtml(choice.label) + '</p></div>' +
      '<div class="hint-box">' + escHtml(choice.hint) + '</div>' +
      '<div class="score-line score-penalty">-20 points</div>' +
      '<button class="retro-btn" onclick="SSS.showFieldNotes()">Keep Investigating \u2192</button>'
    );
  }

  function showCorrectAnswer() {
    setScreen('CORRECT_ANSWER');
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const score = calculateCaseScore();

    STATE.caseState.diagnosed = true;

    // Dedup: if replaying a case, replace old entry and adjust total score
    const prevIdx = STATE.completedCases.findIndex(c => c.caseId === caseData.id);
    if (prevIdx >= 0) {
      STATE.totalScore -= STATE.completedCases[prevIdx].score;
      STATE.completedCases[prevIdx] = {
        caseId: caseData.id,
        wrongGuesses: STATE.caseState.wrongGuesses,
        cluesFound: STATE.caseState.cluesFound.slice(),
        score: score
      };
    } else {
      STATE.completedCases.push({
        caseId: caseData.id,
        wrongGuesses: STATE.caseState.wrongGuesses,
        cluesFound: STATE.caseState.cluesFound.slice(),
        score: score
      });
    }
    STATE.totalScore += score;
    saveState();

    // Crossfade to healthy/awakening scene variant if available
    const altScene = caseData.sprites && caseData.sprites.sceneAlt;
    if (altScene) {
      sceneImg.classList.add('scene-fade');
      sceneImg.style.opacity = '0';
      sceneImg.addEventListener('transitionend', function onEnd() {
        sceneImg.removeEventListener('transitionend', onEnd);
        tryLoadImg(sceneImg, altScene).then(ok => {
          if (ok) {
            sceneImg.style.opacity = '1';
            // Start amber pulse effect on the awakened scene if defined
            if (caseData.sprites.sceneAltFx === 'amberPulse') {
              amberPulsePhase = 0;
              const img = new Image();
              img.onload = function() {
                amberPulseImg = img;
                sceneFxOverlay.classList.add('active');
                runAmberPulseLoop();
              };
              img.src = altScene;
            }
          }
        });
      }, { once: true });
    }

    // If case has a solution choice (e.g. Case 6b), show that before explanation
    if (caseData.solutionChoice) {
      showSolutionChoice(caseData, score);
    } else {
      showExplanation(caseData, score);
    }
  }

  function showSolutionChoice(caseData, baseScore) {
    const sc = caseData.solutionChoice;
    let html = '<div class="info-header green">\u2713 Case Solved!</div>' +
      '<div class="score-line">+' + baseScore + ' points</div>' +
      '<div class="info-body"><p>' + escHtml(sc.prompt) + '</p></div>';

    sc.options.forEach((opt, i) => {
      // Check requirements (e.g. synthesize needs GERMINATION_COMPOUND)
      if (opt.requires) {
        if (opt.requires.clueFound && STATE.caseState.cluesFound.indexOf(opt.requires.clueFound) < 0) return;
      }
      html += '<div class="diagnosis-option" data-idx="' + i + '" onclick="SSS.selectSolution(' + i + ')">' +
        escHtml(opt.label) + '</div>';
    });

    html += '<button id="confirm-solution-btn" class="retro-btn accent disabled" onclick="SSS.confirmSolution()">Choose Solution</button>';
    renderInfo(html);
  }

  let selectedSolution = -1;

  function selectSolution(idx) {
    selectedSolution = idx;
    const opts = infoArea.querySelectorAll('.diagnosis-option');
    opts.forEach((o, i) => o.classList.toggle('selected', i === idx));
    const btn = infoArea.querySelector('#confirm-solution-btn');
    if (btn) btn.classList.remove('disabled');
  }

  function confirmSolution() {
    if (selectedSolution < 0) return;
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const opt = caseData.solutionChoice.options[selectedSolution];

    // Save the choice for the victory screen
    STATE.caseState.solutionIdx = selectedSolution;

    // Apply bonus points
    if (opt.bonusPoints) {
      STATE.totalScore += opt.bonusPoints;
      // Update the completed case score
      const cc = STATE.completedCases.find(c => c.caseId === caseData.id);
      if (cc) cc.score += opt.bonusPoints;
      saveState();
    }

    // Show the response, then proceed to explanation
    const baseScore = (STATE.completedCases.find(c => c.caseId === caseData.id) || {}).score || 0;
    let html = '<div class="info-header green">\u2713 Case Solved!</div>' +
      '<div class="score-line">+' + baseScore + ' points' +
      (opt.bonusPoints ? ' <span style="color:#4ecdc4;">(+' + opt.bonusPoints + ' ' + escHtml(opt.bonusLabel) + ')</span>' : '') +
      '</div>' +
      '<div class="info-body"><p>' + escHtml(opt.response).replace(/\n/g, '<br>') + '</p></div>' +
      '<button class="retro-btn green" onclick="SSS.showExplanationScreen()">Continue \u2192</button>';

    renderInfo(html);
    selectedSolution = -1;
  }

  function showExplanationScreen() {
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const cc = STATE.completedCases.find(c => c.caseId === caseData.id);
    showExplanation(caseData, cc ? cc.score : 0);
  }

  function showExplanation(caseData, score) {
    const isLast = STATE.currentCase >= GAME_DATA.cases.length - 1;

    renderInfo(
      '<div class="info-header green">\u2713 Case Solved!</div>' +
      '<div class="score-line">+' + score + ' points</div>' +
      '<div class="info-body">' +
        '<p style="color:#06b6d4; font-family:\'Press Start 2P\',cursive; font-size:9px; letter-spacing:1px; margin-top:14px;">' +
          escHtml(caseData.explanation.title) + '</p>' +
        '<p style="margin-top:10px;">' + escHtml(caseData.explanation.body).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>') + '</p>' +
      '</div>' +
      '<div class="fun-fact-box">' +
        '<div class="fun-fact-label">\u2728 Fun Fact</div>' +
        escHtml(caseData.explanation.funFact) +
      '</div>' +
      '<button class="retro-btn green" onclick="SSS.' + (isLast ? 'showVictory' : 'nextCase') + '()">' +
        (isLast ? 'See Final Results \u2192' : 'Proceed to Next Case \u2192') +
      '</button>'
    );
  }

  function nextCase() {
    const caseData = GAME_DATA.cases[STATE.currentCase];
    const shouldRankUp = caseData.ranksUp !== false && STATE.rank < GAME_DATA.ranks.length - 1;
    const oldRank = STATE.rank;
    if (shouldRankUp) STATE.rank++;
    STATE.currentCase++;
    STATE.caseState = defaultCaseState();
    saveState();

    if (shouldRankUp) {
      showRankUp(oldRank);
    } else {
      showBriefing();
    }
  }

  // Rank colors — Trainee → Xenobotanist (progression from cool to warm/gold)
  const RANK_COLORS = ['#78909c', '#4fc3f7', '#66bb6a', '#f59e0b', '#f44336', '#a855f7'];
  // Phase 2: Campaign 2 rank colors (5 ranks). Continues the cool→warm progression
  // but shifts toward teals/purples for Federation/Concord feel.
  const RANK_COLORS_C2 = ['#06b6d4', '#14b8a6', '#4ade80', '#f59e0b', '#a855f7'];

  // Rank badge frame names in badge spritesheet
  const RANK_BADGE_FRAMES = [
    'badge_trainee.png',
    'badge_field_agent.png',
    'badge_crop_specialist.png',
    'badge_senior_sleuth.png',
    'badge_chief_sprout_sleuth.png',
    'badge_xenobotanist.png'
  ];
  // Phase 2: Campaign 2 rank badge frame names (in badge_spritesheet_c2.png)
  const RANK_BADGE_FRAMES_C2 = [
    'badge_federation_trainee.png',
    'badge_concord_field_agent.png',
    'badge_cross_species_specialist.png',
    'badge_senior_liaison.png',
    'badge_galactic_botanist.png'
  ];

  // Phase 2: pick the active campaign's rank badge frame array + colors.
  function getActiveRankBadgeFrames() {
    return (STATE.currentCampaign === 1) ? RANK_BADGE_FRAMES_C2 : RANK_BADGE_FRAMES;
  }
  function getActiveRankColors() {
    return (STATE.currentCampaign === 1) ? RANK_COLORS_C2 : RANK_COLORS;
  }

  function rankBadgeHtml(rankIdx) {
    const frameName = getActiveRankBadgeFrames()[rankIdx];
    return '<canvas class="rank-badge-canvas" data-badge-frame="' + frameName + '" width="512" height="512"></canvas>' +
      '<div class="rank-badge-fallback" style="display:none">\ud83c\udf1f</div>';
  }

  function showRankUp(oldRank) {
    setScreen('RANK_UP');
    if (oldRank === undefined) oldRank = Math.max(0, STATE.rank - 1);
    const completedCase = GAME_DATA.cases[STATE.currentCase - 1];
    const flavorText = completedCase && completedCase.rankUpText ? completedCase.rankUpText : '';

    renderInfo(
      '<div style="text-align:center; padding:15px;">' +
        '<div style="font-family:\'Press Start 2P\',cursive; font-size:18px; color:#f59e0b; letter-spacing:3px; text-shadow:0 0 12px rgba(245,158,11,0.5);">Rank Up!</div>' +
        '<div style="margin:15px 0;">' +
          '<canvas id="rankup-badge" class="badge-pixelate-canvas" width="512" height="512"></canvas>' +
        '</div>' +
        '<div style="font-size:22px; color:#8898a8;">Score: ' + STATE.totalScore + '</div>' +
        '<button class="retro-btn accent" style="margin:10px 0;" onclick="SSS.showBriefing()">Continue \u2192</button>' +
        (flavorText ? '<div style="font-size:20px; color:#6a8a9a; padding:0 20px; line-height:1.4;">' + escHtml(flavorText) + '</div>' : '') +
      '</div>'
    );
    // Run pixelate transition
    runBadgePixelate(oldRank, STATE.rank);
  }

  function runBadgePixelate(oldRankIdx, newRankIdx) {
    const canvas = document.getElementById('rankup-badge');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const activeFrames = getActiveRankBadgeFrames();
    const activeSheet = getActiveBadgeSheet();
    const oldFrame = activeFrames[oldRankIdx];
    const newFrame = activeFrames[newRankIdx];

    // Render badge to offscreen canvas
    function renderBadge(frameName) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      if (activeSheet) {
        const f = activeSheet.frameMap[frameName];
        if (f) {
          const bCtx = c.getContext('2d');
          bCtx.imageSmoothingEnabled = false;
          bCtx.drawImage(activeSheet.img, f.x, f.y, f.w, f.h, 0, 0, 512, 512);
        }
      }
      return c;
    }

    const oldImg = renderBadge(oldFrame);
    const newImg = renderBadge(newFrame);
    const tmp = document.createElement('canvas');
    tmp.width = 512; tmp.height = 512;
    const tmpCtx = tmp.getContext('2d');
    tmpCtx.imageSmoothingEnabled = false;

    // Draw old badge first
    ctx.drawImage(oldImg, 0, 0);

    const stepsOut = [256, 128, 64, 32, 16, 8];
    const stepsIn = [8, 16, 32, 64, 128, 256, 512];
    const frameDelay = 100; // 80ms * 1/0.8 speed = 100ms

    let step = 0;
    const totalSteps = stepsOut.length + stepsIn.length;

    // Hold old badge for 1.25s, then animate
    setTimeout(function tick() {
      if (step < stepsOut.length) {
        const res = stepsOut[step];
        tmpCtx.clearRect(0, 0, 512, 512);
        tmpCtx.drawImage(oldImg, 0, 0, 512, 512, 0, 0, res, res);
        tmpCtx.drawImage(tmp, 0, 0, res, res, 0, 0, 512, 512);
        ctx.clearRect(0, 0, 512, 512);
        ctx.drawImage(tmp, 0, 0);
      } else {
        const inIdx = step - stepsOut.length;
        const res = stepsIn[inIdx];
        tmpCtx.clearRect(0, 0, 512, 512);
        tmpCtx.drawImage(newImg, 0, 0, 512, 512, 0, 0, res, res);
        tmpCtx.drawImage(tmp, 0, 0, res, res, 0, 0, 512, 512);
        ctx.clearRect(0, 0, 512, 512);
        ctx.drawImage(tmp, 0, 0);
      }
      step++;
      if (step < totalSteps) {
        setTimeout(tick, frameDelay);
      }
    }, 1250);
  }

    // Species tooltips — 500ms hover delay, follows cursor, flips above if near bottom
    const tooltip = document.createElement('div');
    tooltip.className = 'species-tooltip';
    document.body.appendChild(tooltip);
    let tipTimer = null;
    let tipX = 0, tipY = 0;

    function positionTooltip() {
      const tipW = tooltip.offsetWidth;
      const tipH = tooltip.offsetHeight;
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      const gap = 14;
      // Vertical: center tooltip's midpoint on cursor Y, clamp to viewport
      let top = tipY - tipH / 2;
      if (top < 4) top = 4;
      if (top + tipH > winH - 4) top = winH - tipH - 4;
      // Horizontal: prefer right of cursor, flip left if it would go off-screen
      const left = (tipX + gap + tipW < winW)
        ? tipX + gap
        : tipX - gap - tipW;
      tooltip.style.left = left + 'px';
      tooltip.style.top = top + 'px';
    }

    charCreate.querySelectorAll('.species-option').forEach(opt => {
      opt.addEventListener('mouseenter', () => {
        const species = CAMPAIGN_2_DATA.species.find(s => s.id === opt.dataset.species);

            return '<span class="tip-value" style="grid-column:1/-1">' + line + '</span>';
          }).join('');
          positionTooltip();
          tooltip.classList.add('visible');
        }, 500);
      });
      opt.addEventListener('mousemove', e => {
        tipX = e.clientX;
        tipY = e.clientY;
        if (tooltip.classList.contains('visible')) positionTooltip();
      });
      opt.addEventListener('mouseleave', () => {
        clearTimeout(tipTimer);
        tooltip.classList.remove('visible');
      });
    });

    updateCharCreateConfirmState();
  }
