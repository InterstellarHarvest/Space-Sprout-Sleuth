  // ── Title screen ────────────────────────────────────────────────
  // ── Starfield with twinkle ──────────────────────────────────────
  let titleStarsData = [];
  let twinkleRAF = null;

  function initStarfield(canvas) {
    const ctx = canvas.getContext('2d');
    titleStarsData = [];
    for (let i = 0; i < 120; i++) {
      titleStarsData.push({
        x: Math.floor(Math.random() * canvas.width),
        y: Math.floor(Math.random() * canvas.height),
        size: Math.random() < 0.15 ? 2 : 1,
        baseAlpha: Math.random() * 0.5 + 0.3,
        // Only ~15 stars twinkle to keep it subtle and cheap
        twinkle: i < 15,
        phase: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.7
      });
    }
    drawStarframe(ctx, canvas.width, canvas.height, 0);
  }

  function drawStarframe(ctx, w, h, time) {
    ctx.clearRect(0, 0, w, h);
    for (let i = 0; i < titleStarsData.length; i++) {
      const s = titleStarsData[i];
      let a = s.baseAlpha;
      if (s.twinkle) {
        a = s.baseAlpha + Math.sin(time * s.speed + s.phase) * 0.35;
        a = Math.max(0.08, Math.min(1, a));
      }
      ctx.fillStyle = 'rgba(200,220,255,' + a.toFixed(2) + ')';
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
  }

  function startTwinkle() {
    stopTwinkle();
    const canvas = titleStars;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    let last = 0;
    function tick(ts) {
      // Throttle to ~15fps to stay cheap
      if (ts - last > 66) {
        drawStarframe(ctx, w, h, ts * 0.001);
        last = ts;
      }
      twinkleRAF = requestAnimationFrame(tick);
    }
    twinkleRAF = requestAnimationFrame(tick);
  }

  function stopTwinkle() {
    if (twinkleRAF) { cancelAnimationFrame(twinkleRAF); twinkleRAF = null; }
  }

  // ── Scene window effects (stars / dust behind PNG) ───────────────
  // Two modes:
  //   sceneWindow: { x, y, w, h } — rect-clipped stars (ISS, Lunar)
  //   sceneFx: { type:'dust', mask:'path.png' } — mask-clipped dust (Mars)
  // Mask: white = blocked (frame), black = visible (glass). We draw
  // particles first, then erase the white areas with destination-out.

  const SCENE_STAR_LAYERS = [
    { count: 18, speed: 0.08, size: 1, minAlpha: 0.25, maxAlpha: 0.50 },
    { count: 10, speed: 0.16, size: 1, minAlpha: 0.45, maxAlpha: 0.70 },
    { count:  5, speed: 0.30, size: 1, minAlpha: 0.65, maxAlpha: 1.00 },
  ];

  let sceneFxParticles = [];
  let sceneFxWin = null;        // rect clip for stars
  let sceneFxMask = null;       // Image element for mask
  let sceneFxType = null;       // 'stars' | 'dust' | 'twinkle'
  let sceneFxRAF = null;

  // Sprite sheet animation (e.g. spinning Earth in a window)
  let windowSprite = null;      // { img, frameW, frameH, cols, totalFrames, fps, scale, frame, lastFrameTime }

  function initSceneFxStars(win) {
    sceneFxWin = win;
    sceneFxType = win.twinkle ? 'twinkle' : 'stars';
    sceneFxParticles = [];
    SCENE_STAR_LAYERS.forEach(layer => {
      for (let i = 0; i < layer.count; i++) {
        const baseAlpha = layer.minAlpha + Math.random() * (layer.maxAlpha - layer.minAlpha);
        sceneFxParticles.push({
          x:     win.x + Math.random() * win.w,
          y:     win.y + Math.random() * win.h,
          dx:    0,
          dy:    win.twinkle ? 0 : -layer.speed,
          size:  layer.size,
          alpha: baseAlpha,
          baseAlpha: baseAlpha,
          phase: Math.random() * Math.PI * 2,    // random start phase for twinkle
          twinkle: i < 15,                        // only some stars twinkle
          color: '#c8e0ff',
        });
      }
    });
  }

  const DUST_COLORS = ['#6b3a2a','#7a4433','#5c2e1e','#8b5e3c','#4a2216','#6e3028','#7f4a38'];

  function initSceneFxDust() {
    sceneFxType = 'dust';
    sceneFxParticles = [];
    for (let i = 0; i < 50; i++) {
      const spd = 0.35 + Math.random() * 0.45;
      const vert = (Math.random() - 0.5) * 0.60;
      sceneFxParticles.push({
        x:     Math.random() * 240,
        y:     Math.random() * 280,
        dx:    spd,
        dy:    vert,
        size:  1 + Math.floor(Math.random() * 2),
        alpha: 0.15 + Math.random() * 0.30,
        color: DUST_COLORS[Math.floor(Math.random() * DUST_COLORS.length)],
      });
    }
  }

  const BUBBLE_COLORS = ['#1a3a2a','#0d2e1e','#1e4030','#0a2818','#153322'];
  function initSceneFxBubbles() {
    sceneFxType = 'bubbles';
    sceneFxParticles = [];
    for (let i = 0; i < 120; i++) {
      sceneFxParticles.push({
        x:     Math.random() * 240,
        y:     Math.random() * 280,
        dx:    (Math.random() - 0.5) * 0.15,     // tiny horizontal wobble
        dy:    -(0.5 + Math.random() * 0.8),     // rise upward fast
        size:  1 + Math.floor(Math.random() * 2),
        alpha: 0.20 + Math.random() * 0.35,
        color: BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)],
      });
    }
  }

  function drawSceneFx() {
    if (sceneFxType === 'dust' || sceneFxType === 'bubbles') {
      // Dust draws on the OVERLAY canvas (on top of scene PNG)
      const ctx = sceneFxOverlayCtx;
      ctx.clearRect(0, 0, 240, 280);

      sceneFxParticles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0) p.x = 240;
        if (p.x > 240) p.x = 0;
        if (p.y < 0) p.y = 280;
        if (p.y > 280) p.y = 0;
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
      });
      ctx.globalAlpha = 1;

      // Erase where mask is opaque (black blocking areas)
      if (sceneFxMask) {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.drawImage(sceneFxMask, 0, 0, 240, 280);
        ctx.globalCompositeOperation = 'source-over';
      }
      ctx.globalAlpha = 1;

    } else {
      // Stars/twinkle draw on the BEHIND canvas (behind scene PNG)
      const ctx = sceneStarsCtx;
      ctx.clearRect(0, 0, 240, 280);
      const win = sceneFxWin;
      ctx.fillStyle = '#03050f';
      ctx.fillRect(win.x, win.y, win.w, win.h);
      ctx.save();
      ctx.beginPath();
      ctx.rect(win.x, win.y, win.w, win.h);
      ctx.clip();

      const now = performance.now() * 0.001;
      sceneFxParticles.forEach(p => {
        if (sceneFxType === 'twinkle') {
          if (p.twinkle) {
            p.alpha = p.baseAlpha * (0.5 + 0.5 * Math.sin(now * 1.5 + p.phase));
          }
        } else {
          p.x += p.dx;
          p.y += p.dy;
          if (p.y < win.y) {
            p.y = win.y + win.h;
            p.x = win.x + Math.random() * win.w;
          }
        }
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
      });

      // Draw sprite sheet animation (e.g. spinning Earth) centered in window
      if (windowSprite && windowSprite.img) {
        const ws = windowSprite;
        const now = performance.now();
        const interval = 1000 / ws.fps;
        if (now - ws.lastFrameTime >= interval) {
          ws.frame = (ws.frame + 1) % ws.totalFrames;
          ws.lastFrameTime = now;
        }
        const sx = (ws.frame % ws.cols) * ws.frameW;
        const sy = Math.floor(ws.frame / ws.cols) * ws.frameH;
        const dw = ws.frameW * ws.scale;
        const dh = ws.frameH * ws.scale;
        const cx = win.x + win.w / 2;
        const cy = win.y + win.h / 2;
        ctx.globalAlpha = 1;
        ctx.imageSmoothingEnabled = false;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-23.4 * Math.PI / 180);   // Earth's axial tilt
        ctx.drawImage(ws.img, sx, sy, ws.frameW, ws.frameH, -dw / 2, -dh / 2, dw, dh);
        // Black circle outline on top to hide jagged edges
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, dw / 2 - 1, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  function startSceneFx(caseData) {
    stopSceneFx();
    const win = caseData.sceneWindow;
    const fx  = caseData.sceneFx;

    if (fx && (fx.type === 'dust' || fx.type === 'bubbles')) {
      // Load mask, then start overlay effect
      const img = new Image();
      img.onload = function() {
        sceneFxMask = img;
        if (fx.type === 'bubbles') initSceneFxBubbles(); else initSceneFxDust();
        sceneFxOverlay.classList.add('active');
        runSceneFxLoop();
      };
      img.onerror = function() {
        sceneFxMask = null;
        if (fx.type === 'bubbles') initSceneFxBubbles(); else initSceneFxDust();
        sceneFxOverlay.classList.add('active');
        runSceneFxLoop();
      };
      img.src = fx.mask;
    } else if (win) {
      // Stars/twinkle on behind canvas (behind PNG)
      initSceneFxStars(win);
      // Load window sprite sheet if defined
      windowSprite = null;
      if (win.sprite) {
        const spr = win.sprite;
        const sprImg = new Image();
        sprImg.onload = function() {
          windowSprite = {
            img: sprImg,
            frameW: spr.frameW, frameH: spr.frameH,
            cols: spr.cols, totalFrames: spr.totalFrames,
            fps: spr.fps, scale: spr.scale || 1,
            frame: 0, lastFrameTime: 0
          };
        };
        sprImg.src = spr.src;
      }
      sceneStarsCvs.classList.add('active');
      runSceneFxLoop();
    }
  }

  function runSceneFxLoop() {
    let last = 0;
    function tick(ts) {
      if (ts - last > 66) {       // ~15fps
        drawSceneFx();
        last = ts;
      }
      sceneFxRAF = requestAnimationFrame(tick);
    }
    sceneFxRAF = requestAnimationFrame(tick);
  }

  // ── Amber pulse effect (Case 6b genesis pod glow) ───────────────
  let amberPulseImg = null;
  let amberPulsePhase = 0;
  let amberPulseRAF = null;

  function runAmberPulseLoop() {
    let last = 0;
    function tick(ts) {
      if (ts - last > 100) {  // 100ms frame interval
        drawAmberPulse();
        last = ts;
      }
      amberPulseRAF = requestAnimationFrame(tick);
    }
    amberPulseRAF = requestAnimationFrame(tick);
  }

  function drawAmberPulse() {
    if (!amberPulseImg) return;
    const cvs = sceneFxOverlay;
    const ctx = cvs.getContext('2d');
    const w = cvs.width, h = cvs.height;

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(amberPulseImg, 0, 0, w, h);

    const imgData = ctx.getImageData(0, 0, w, h);
    const px = imgData.data;
    amberPulsePhase += 0.12;
    const pulse = (Math.sin(amberPulsePhase) * 0.5 + 0.5); // 0 to 1, always positive

    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i+1], b = px[i+2], a = px[i+3];
      if (a < 30) continue;

      const warmth = r - b;
      const saturation = r - Math.min(g, b);
      if (warmth > 20 && saturation > 15) {
        const factor = Math.min(warmth / 150, 1);
        const boost = pulse * 120 * factor;
        px[i]   = Math.min(255, r + boost) | 0;
        px[i+1] = Math.min(255, g + boost * 0.6) | 0;
        px[i+2] = Math.min(255, b + boost * 0.1) | 0;
      }
    }
    ctx.putImageData(imgData, 0, 0);
  }

  function stopSceneFx() {
    if (sceneFxRAF) { cancelAnimationFrame(sceneFxRAF); sceneFxRAF = null; }
    if (amberPulseRAF) { cancelAnimationFrame(amberPulseRAF); amberPulseRAF = null; }
    sceneFxMask = null;
    sceneFxType = null;
    windowSprite = null;
    amberPulseImg = null;
    sceneStarsCvs.classList.remove('active');
    sceneFxOverlay.classList.remove('active');
  }

  // ── Scene static transition ──────────────────────────────────────
  let staticRAF = null;
  let staticTimeout = null;

  function playStaticTransition(duration, onDone) {
    sceneStatic.style.display = 'block';
    const w = sceneStatic.width;   // 120
    const h = sceneStatic.height;  // 140
    const imgData = sceneStaticCtx.createImageData(w, h);
    const pixels = imgData.data;

    function drawNoise() {
      for (let i = 0; i < pixels.length; i += 4) {
        const v = Math.random() * 255 | 0;
        pixels[i] = v;
        pixels[i + 1] = v;
        pixels[i + 2] = v;
        pixels[i + 3] = 255;
      }
      sceneStaticCtx.putImageData(imgData, 0, 0);
      staticRAF = requestAnimationFrame(drawNoise);
    }

    staticRAF = requestAnimationFrame(drawNoise);
    staticTimeout = setTimeout(() => {
      cancelAnimationFrame(staticRAF);
      staticRAF = null;
      sceneStatic.style.display = 'none';
      if (onDone) onDone();
    }, duration);
  }

  // Scramble text in an element, then resolve to new text (SpriteVG-style glitch)
  function glitchText(el, newText, opts) {
    const junk = '▓█▒░▄▀■□▪▫#@%?!~^<>{}|*';
    const glitchColor = '#5a8a9a';
    const duration = (opts && opts.duration) || 400;
    const padLen = Math.max(el.textContent.length, newText.length);
    const target = newText.padEnd(padLen);

    // Wrap each character in a span
    const oldText = el.textContent.padEnd(padLen);
    el.textContent = '';
    const spans = [];
    for (let i = 0; i < padLen; i++) {
      const span = document.createElement('span');
      span.textContent = oldText[i] || ' ';
      el.appendChild(span);
      spans.push(span);
    }

    // Each character: scramble for a random delay, then snap to final
    spans.forEach((span, i) => {
      const resolveAt = (0.3 + Math.random() * 0.5) * duration;
      let ticks = 0;
      const iv = setInterval(() => {
        span.textContent = junk[Math.random() * junk.length | 0];
        span.style.color = ticks % 2 === 0 ? glitchColor : '#8ab0b8';
        ticks++;
      }, 50);
      setTimeout(() => {
        clearInterval(iv);
        span.textContent = target[i];
        span.style.color = '';
      }, resolveAt);
    });

    // Clean up: replace spans with plain text after animation
    setTimeout(() => { el.textContent = newText; }, duration + 50);
  }

  // Only allow letters, spaces, hyphens, apostrophes, periods
  const VALID_NAME_RE = /^[A-Za-z][A-Za-z .'\-]*$/;

  function startGame() {
    stopTransmissionFx();
    const raw = nameInput.value.trim();
    if (raw && !VALID_NAME_RE.test(raw)) {
      nameInput.style.borderColor = '#ff4444';
      nameInput.setAttribute('placeholder', 'Letters only (e.g. Dr. Nova)');
      nameInput.value = '';
      nameInput.focus();
      setTimeout(() => { nameInput.style.borderColor = ''; }, 2000);
      return;
    }
    const name = raw || 'Dr. Nova';
    // Phase 1: preserve the campaign1Complete unlock across fresh playthroughs
    // so the [INCOMING TRANSMISSION] button doesn't disappear if the player
    // replays Campaign 1 after finishing it.
    const wasUnlocked = STATE.campaign1Complete || false;
    STATE = defaultState();
    STATE.playerName = name;
    STATE.campaign1Complete = wasUnlocked;
    setActiveCampaign(0);
    saveState();
    showBriefing();
  }

  // ── Resume logic ────────────────────────────────────────────────
  function checkResume() {
    const saved = loadState();
    if (saved && saved.currentCase > 0) {
      resumePrompt.classList.remove('hidden');
      resumePrompt.innerHTML =
        '<div class="resume-panel">' +
          '<h2>Saved Mission Found</h2>' +
          '<p><span style="color:#f59e0b;">' + escHtml(saved.playerName) + '</span> \u2014 Case ' + caseDisplayLabel(saved.currentCase) + ' of ' + caseDisplayTotal() + '</p>' +
          '<p>Current Score: ' + saved.totalScore + '</p>' +
          '<div class="resume-btns">' +
            '<button class="retro-btn accent" onclick="SSS.resumeGame()">Resume</button>' +
            '<button class="retro-btn" onclick="SSS.declineResume()">New Game</button>' +
          '</div>' +
        '</div>';
    }
  }

  function resumeGame() {
    const saved = loadState();
    if (saved) {
      STATE = saved;
      setActiveCampaign(STATE.currentCampaign || 0);
      resumePrompt.classList.add('hidden');
      // Guard: if saved case is beyond array, treat as victory
      if (STATE.currentCase >= GAME_DATA.cases.length) {
        showVictory();
      } else if (STATE.caseState.diagnosed) {
        // Edge case: saved right after solving but before next case
        nextCase();
      } else {
        showBriefing();
      }
    }
  }

  function declineResume() {
    // Phase 1: preserve the campaign1Complete unlock when player chooses New Game
    // from the resume prompt (otherwise we'd strip the flag from a player who
    // already finished Campaign 1 once and was mid-replay).
    const flag = STATE.campaign1Complete;
    STATE = defaultState();
    STATE.campaign1Complete = flag;
    setActiveCampaign(0);
    saveState();
    resumePrompt.classList.add('hidden');
    playTitleIntro();
  }

  // ── Utility ─────────────────────────────────────────────────────
  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Viewport scaling ────────────────────────────────────────────
  function fitViewport() {
    const root = $('scale-root');
    const w = window.innerWidth;
    const h = window.innerHeight;
    const sx = w / 960;
    const sy = h / 640;
    const s = Math.min(sx, sy);
    root.style.transform = 'scale(' + s + ')';
  }

  // ── Bonus case display helpers ───────────────────────────────────
  // Returns the label shown in the banner & menu for a given case index
  // Cases 0-6 → "1"–"7"
  function caseDisplayLabel(idx) {
    return String(idx + 1);
  }

  // Returns the "of N" total for the banner, based on what's unlocked
  function caseDisplayTotal() {
    if (STATE.currentCampaign === 1) {
      // Campaign 2: progressive reveal — Case 6 hidden until unlocked
      if (isCaseUnlocked(5)) return '6';
      return '5';
    }
    // Campaign 1: progressive reveal of bonus cases
    if (isCaseUnlocked(6)) return '7';
    if (isCaseUnlocked(5)) return '6';
    return '5';
  }

  // Whether a case index is unlocked for the player
  // ── DEV: flip to false for production ──
  var DEV_UNLOCK_ALL = true;

  // ── DEV: Campaign 2 testing flag (Phase 1) ──
  // When true, forces STATE.campaign1Complete = true on every load so the
  // [INCOMING TRANSMISSION] button appears without having to play through
  // all 7 cases. Flip to false for production.
  var DEV_CAMPAIGN1_COMPLETE = true;
  function isCaseUnlocked(idx) {
    if (DEV_UNLOCK_ALL) return true;
    // Main cases 0-4: unlocked if <= highest completed + 1
    if (idx <= 4) return idx <= STATE.currentCase || STATE.completedCases.some(cc => cc.caseId === GAME_DATA.cases[idx].id);
    // Case 6 (index 5): unlocked after all 5 main cases completed
    if (idx === 5) return STATE.completedCases.filter(cc => {
      const ci = GAME_DATA.cases.findIndex(c => c.id === cc.caseId);
      return ci >= 0 && ci <= 4;
    }).length >= 5 || STATE.currentCase >= 5;
    // Case 6b (index 6): unlocked after Case 6 completed
    if (idx === 6) return STATE.completedCases.some(cc => cc.caseId === 'alien1') || STATE.currentCase >= 6;
    return false;
  }

  // ── Level select dropdown ────────────────────────────────────────
  const levelSelectEl = $('level-select');
  let levelSelectOpen = false;

  function buildLevelSelect() {
    levelSelectEl.innerHTML = '';

    for (let i = 0; i < GAME_DATA.cases.length; i++) {
      const caseData = GAME_DATA.cases[i];
      const unlocked = isCaseUnlocked(i);
      const isCurrent = i === STATE.currentCase;
      const completed = STATE.completedCases.find(cc => cc.caseId === caseData.id);

      // Bonus cases are completely hidden until unlocked
      if (caseData.isBonus && !unlocked) continue;

      const opt = document.createElement('div');
      opt.className = 'level-option' + (unlocked ? '' : ' locked') + (isCurrent ? ' current' : '');

      const numEl = document.createElement('span');
      numEl.className = 'level-option-num';
      numEl.textContent = caseDisplayLabel(i);

      const nameEl = document.createElement('span');
      nameEl.className = 'level-option-name';
      nameEl.textContent = caseData.name;

      opt.appendChild(numEl);
      opt.appendChild(nameEl);

      if (completed) {
        const scoreEl = document.createElement('span');
        scoreEl.className = 'level-option-score';
        scoreEl.textContent = completed.score + ' pts';
        opt.appendChild(scoreEl);
      } else if (!unlocked) {
        const lockEl = document.createElement('span');
        lockEl.className = 'level-option-lock';
        lockEl.textContent = '\ud83d\udd12 LOCKED';
        opt.appendChild(lockEl);
      } else {
        // Current / not yet completed — show dash
        const scoreEl = document.createElement('span');
        scoreEl.className = 'level-option-score';
        scoreEl.textContent = '\u2014';
        opt.appendChild(scoreEl);
      }

      // DEV ONLY: clicking a level option jumps to that case. In normal play
      // the dropdown is a read-only status display.
      if (DEV_UNLOCK_ALL) {
        opt.style.cursor = 'pointer';
        const targetIdx = i;
        opt.addEventListener('click', () => {
          STATE.currentCase = targetIdx;
          STATE.caseState = defaultCaseState();
          saveState();
          lastLoadedCase = -1;
          closeLevelSelect();
          showBriefing();
        });
      }

      levelSelectEl.appendChild(opt);
    }
  }

  function toggleLevelSelect() {
    levelSelectOpen = !levelSelectOpen;
    if (levelSelectOpen) {
      buildLevelSelect();
      levelSelectEl.style.display = 'block';
    } else {
      levelSelectEl.style.display = 'none';
    }
  }

  function closeLevelSelect() {
    levelSelectOpen = false;
    levelSelectEl.style.display = 'none';
  }

  // ── Title intro animation (Style B — Typewriter Reveal, 7s) ─────
  const skipHint = $('skip-hint');

  let introRunning = false;
  let introTimers = [];

  function introDelay(ms) {
    return new Promise(r => {
      introTimers.push(setTimeout(r, ms));
    });
  }

  function clearIntroTimers() {
    introTimers.forEach(clearTimeout);
    introTimers = [];
  }

  // ── Transmission terminal animation (signal lock + glitch decode) ──
  const TX_TARGET = 'INCOMING TRANSMISSION';
  const TX_GLITCH_CHARS = '!@#$%^&*()_+-=[]{}|;:<>?/~0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const TX_LOCK_MS = 3500;
  const TX_GLITCH_INTERVAL = 4000;
  const TX_GLITCH_PCT = 0.4;
  let txTimers = [];
  let txGlitchLoop = null;
  const txText = $('tx-text');
  const txCursor = $('tx-cursor');
  const txLed = $('tx-led');
  const txBarsEl = $('tx-bars');

  function stopTransmissionFx() {
    txTimers.forEach(clearTimeout);
    txTimers = [];
    if (txGlitchLoop) { clearInterval(txGlitchLoop); txGlitchLoop = null; }
  }

  function snapTransmissionFinal() {
    stopTransmissionFx();
    if (!txText || !txBarsEl) return;
    txText.textContent = TX_TARGET;
    txText.classList.add('visible');
    txCursor.classList.add('active');
    txLed.classList.add('active');
    Array.from(txBarsEl.children).forEach(b => b.classList.add('active'));
    startTxGlitchLoop();
  }

  function startTxGlitchLoop() {
    if (txGlitchLoop) clearInterval(txGlitchLoop);
    txGlitchLoop = setInterval(() => {
      let frame = 0;
      const scrambleFrames = 5;
      const resolveFrames = 5;
      const frameMs = 50;
      txCursor.classList.remove('active');

      function tick() {
        if (frame < scrambleFrames) {
          let t = '';
          for (let i = 0; i < TX_TARGET.length; i++) {
            if (TX_TARGET[i] === ' ') { t += ' '; continue; }
            t += Math.random() < TX_GLITCH_PCT
              ? TX_GLITCH_CHARS[Math.floor(Math.random() * TX_GLITCH_CHARS.length)]
              : TX_TARGET[i];
          }
          txText.textContent = t;
        } else if (frame < scrambleFrames + resolveFrames) {
          const p = (frame - scrambleFrames) / resolveFrames;
          let t = '';
          for (let i = 0; i < TX_TARGET.length; i++) {
            if (TX_TARGET[i] === ' ') { t += ' '; continue; }
            t += (i / TX_TARGET.length) < p
              ? TX_TARGET[i]
              : TX_GLITCH_CHARS[Math.floor(Math.random() * TX_GLITCH_CHARS.length)];
          }
          txText.textContent = t;
        } else {
          txText.textContent = TX_TARGET;
          txCursor.classList.add('active');
          return;
        }
        frame++;
        setTimeout(tick, frameMs);
      }
      tick();
    }, TX_GLITCH_INTERVAL);
  }

  function runTransmissionSequence() {
    stopTransmissionFx();
    if (!txText || !txBarsEl) return;

    txText.textContent = '';
    txText.classList.remove('visible');
    txCursor.classList.remove('active');
    txLed.classList.remove('active');
    txLed.style.background = '#333';
    txLed.style.boxShadow = 'none';
    Array.from(txBarsEl.children).forEach(b => b.classList.remove('active'));

    const bars = txBarsEl.children;
    const barCount = bars.length;
    const barInterval = TX_LOCK_MS * 0.7 / barCount;
    const decodeStart = TX_LOCK_MS * 0.3;
    const decodeDuration = TX_LOCK_MS * 0.7;

    for (let i = 0; i < barCount; i++) {
      txTimers.push(setTimeout(() => bars[i].classList.add('active'), barInterval * (i + 1)));
    }

    txTimers.push(setTimeout(() => {
      txLed.classList.add('active');
      txLed.style.background = '';
      txLed.style.boxShadow = '';
    }, barInterval));

    txTimers.push(setTimeout(() => {
      txText.classList.add('visible');
      const steps = 14;
      const stepMs = decodeDuration / steps;
      for (let s = 0; s <= steps; s++) {
        txTimers.push(setTimeout(() => {
          const progress = s / steps;
          let t = '';
          for (let i = 0; i < TX_TARGET.length; i++) {
            if (TX_TARGET[i] === ' ') { t += ' '; continue; }
            t += (i / TX_TARGET.length) < progress
              ? TX_TARGET[i]
              : TX_GLITCH_CHARS[Math.floor(Math.random() * TX_GLITCH_CHARS.length)];
          }
          txText.textContent = t;
        }, stepMs * s));
      }
    }, decodeStart));

    txTimers.push(setTimeout(() => {
      txText.textContent = TX_TARGET;
      txCursor.classList.add('active');
      startTxGlitchLoop();
    }, TX_LOCK_MS));
  }

  function finishIntro() {
    if (!introRunning) return;
    introRunning = false;
    clearIntroTimers();
    // Snap everything to final state
    titleStars.style.transition = 'none';
    titleStars.style.opacity = '';
    const logoEl = $('title-logo');
    const subEl = $('title-sub');
    logoEl.childNodes[0].textContent = 'Space Sprout Sleuth';
    subEl.textContent = 'Solar Agricultural Authority';
    subEl.style.opacity = '';
    subEl.style.transition = '';

    // Unhide both sprout variants, let CSS handle which shows
    const finishList = [$('title-sprout-img'), $('title-sprout'), logoEl, nameInput.parentElement, beginBtn];
    // Phase 1: include transmission button only if Campaign 1 is complete
    if (STATE.campaign1Complete) finishList.push(transmissionBtn);
    finishList.forEach(el => {
      if (el) {
        el.classList.remove('intro-hidden');
        el.style.cssText = '';
      }
    });
    // Make sure the transmission button reflects the current unlock state on every skip
    transmissionBtn.classList.toggle('hidden', !STATE.campaign1Complete);
    // Snap transmission terminal to fully-locked state if visible
    if (STATE.campaign1Complete) snapTransmissionFinal();
    nameInput.style.cssText = '';
    skipHint.classList.remove('visible');
    nameInput.focus();
  }

  // Helper: get whichever sprout element is active (sprite canvas or emoji fallback)
  function getActiveSprout() {
    const img = $('title-sprout-img');
    return (img && img.classList.contains('loaded')) ? img : $('title-sprout');
  }

  async function playTitleIntro() {
    if (introRunning) return;
    introRunning = true;
    skipHint.classList.add('visible');

    const logoEl = $('title-logo');
    const subEl = $('title-sub');
    const inputW = nameInput.parentElement;

    // Phase 1 (Campaign 2 foundation): show [INCOMING TRANSMISSION] button only
    // when Campaign 1 has been completed at least once. The .hidden class on the
    // button is the persistent gate; intro-hidden is layered on top during animation.
    const showTransmission = !!STATE.campaign1Complete;
    transmissionBtn.classList.toggle('hidden', !showTransmission);

    // Hide everything (hide both sprout variants so whichever loads is covered)
    titleStars.style.opacity = '0';
    const introHideList = [$('title-sprout-img'), $('title-sprout'), logoEl, inputW, beginBtn];
    if (showTransmission) introHideList.push(transmissionBtn);
    introHideList.forEach(el => {
      if (el) el.classList.add('intro-hidden');
    });

    await introDelay(100);
    if (!introRunning) return;

    // Stars: fade in
    titleStars.style.transition = 'opacity 1.2s ease-in';
    void titleStars.offsetWidth;
    titleStars.style.opacity = '1';
    await introDelay(600);
    if (!introRunning) return;

    // Sprout: resolve NOW (sprite may have loaded during star animation)
    const activeSprout = getActiveSprout();
    activeSprout.classList.remove('intro-hidden');
    activeSprout.style.opacity = '0';
    activeSprout.style.transform = 'scale(0)';
    activeSprout.style.filter = 'brightness(3)';
    void activeSprout.offsetWidth;
    activeSprout.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
    activeSprout.style.opacity = '1';
    activeSprout.style.transform = 'scale(1)';
    activeSprout.style.filter = 'brightness(1)';
    await introDelay(600);
    if (!introRunning) return;

    // Logo: type in letter by letter
    const logoText = 'Space Sprout Sleuth';
    const subText = 'Solar Agricultural Authority';
    logoEl.classList.remove('intro-hidden');
    logoEl.style.opacity = '1';
    logoEl.childNodes[0].textContent = '';
    subEl.textContent = '';
    subEl.style.opacity = '0';

    const charDelay = Math.max(30, 1200 / logoText.length);
    for (let i = 0; i < logoText.length; i++) {
      if (!introRunning) return;
      logoEl.childNodes[0].textContent = logoText.substring(0, i + 1);
      await introDelay(charDelay);
    }
    await introDelay(200);
    if (!introRunning) return;

    // Sub: type in letter by letter
    subEl.style.opacity = '1';
    const subCharDelay = Math.max(20, 800 / subText.length);
    for (let i = 0; i < subText.length; i++) {
      if (!introRunning) return;
      subEl.textContent = subText.substring(0, i + 1);
      await introDelay(subCharDelay);
    }
    await introDelay(200);
    if (!introRunning) return;

    // Input wrap: slide up, pre-style input as focused so it doesn't "snap on"
    inputW.classList.remove('intro-hidden');
    inputW.style.opacity = '0';
    inputW.style.transform = 'translateY(30px)';
    nameInput.style.borderColor = 'rgba(6,182,212,0.5)';
    nameInput.style.boxShadow = '0 0 10px rgba(6,182,212,0.2)';
    void inputW.offsetWidth;
    inputW.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
    inputW.style.opacity = '1';
    inputW.style.transform = 'translateY(0)';
    await introDelay(350);
    if (!introRunning) return;

    // Button: slide up
    beginBtn.classList.remove('intro-hidden');
    beginBtn.style.opacity = '0';
    beginBtn.style.transform = 'translateY(30px)';
    void beginBtn.offsetWidth;
    beginBtn.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
    beginBtn.style.opacity = '1';
    beginBtn.style.transform = 'translateY(0)';
    await introDelay(350);
    if (!introRunning) return;

    // Phase 2: transmission terminal slides up then plays lock-in sequence
    if (showTransmission) {
      stopTransmissionFx();
      transmissionBtn.classList.remove('intro-hidden');
      transmissionBtn.style.opacity = '0';
      transmissionBtn.style.transform = 'translateY(30px)';
      void transmissionBtn.offsetWidth;
      transmissionBtn.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
      transmissionBtn.style.opacity = '1';
      transmissionBtn.style.transform = 'translateY(0)';
      await introDelay(500);
      if (!introRunning) return;
      runTransmissionSequence();
    }

    await introDelay(200);
    // Clean up inline styles
    titleStars.style.cssText = '';
    const cleanupList = [getActiveSprout(), logoEl, inputW, beginBtn];
    if (showTransmission) cleanupList.push(transmissionBtn);
    cleanupList.forEach(el => {
      el.classList.remove('intro-hidden');
      el.style.cssText = '';
    });
    subEl.style.cssText = '';
    nameInput.style.cssText = '';
    skipHint.classList.remove('visible');
    introRunning = false;
    nameInput.focus();
  }

  // Skip on click anywhere on title screen (but not on input/button)
  titleScreen.addEventListener('click', (e) => {
    if (!introRunning) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    finishIntro();
  });

  // ── Title screen sprite init ────────────────────────────────────
  function initTitleSprites() {
    // Draw title sprout from UI spritesheet
    loadUiSheet().then(() => {
      const sproutCanvas = $('title-sprout-img');
      if (sproutCanvas && uiSheetData) {
        drawUiFrame(sproutCanvas, 'title_sprout.png');
        sproutCanvas.classList.add('loaded');
        const fallback = $('title-sprout');
        if (fallback) fallback.classList.add('hidden');
        // If intro is running, hide the sprite so the intro can animate it
        if (introRunning) sproutCanvas.classList.add('intro-hidden');
      }
    });
    // Preload badge spritesheet (used on rank-up screen)
    loadBadgeSheet();
    loadAlienSheet();
    // Phase 2: Campaign 2 sheets loaded in parallel. Harmless for C1 players
    // (they just sit unused until/unless [INCOMING TRANSMISSION] is clicked).
    loadUiSheetC2();
    loadBadgeSheetC2();
  }

  // ── SAA logo hover expand ────────────────────────────────────────
  (function() {
    const icon = $('saa-icon');
    const logo = $('saa-logo');
    let collapseTimer = null;
    icon.addEventListener('mouseenter', () => {
      clearTimeout(collapseTimer);
      logo.classList.add('expanded');
    });
    icon.addEventListener('mouseleave', () => {
      collapseTimer = setTimeout(() => logo.classList.remove('expanded'), 800);
    });
  })();

  // ── Event wiring ────────────────────────────────────────────────
  beginBtn.addEventListener('click', startGame);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
  // Phase 2: transmission button shows the character creation popup.
  // showCharCreation() collects name + species, then calls enterCampaign2()
  // which swaps state to Campaign 2 and drops into the Case 1 briefing.
  transmissionBtn.addEventListener('click', showCharCreation);
  let diagnoseNagTimer = null;
  diagnoseBtn.addEventListener('click', () => {
    if (currentScreen === 'INVESTIGATING' || currentScreen === 'CLUE_REVEAL') {
      const caseData = GAME_DATA.cases[STATE.currentCase];
      const totalClues = caseData.clues.length;
      const foundClues = STATE.caseState.cluesFound.length;
      if (foundClues < totalClues) {
        if (diagnoseNagTimer) return; // ignore spam clicks during cooldown
        // Temporarily show message on the button
        const original = diagnoseBtn.innerHTML;
        diagnoseBtn.textContent = 'Need more evidence!';
        diagnoseBtn.style.color = '#f87171';
        diagnoseBtn.style.borderColor = '#f87171';
        const game = $('game');
        game.classList.remove('shake');
        void game.offsetWidth;
        game.classList.add('shake');
        game.addEventListener('animationend', () => game.classList.remove('shake'), { once: true });
        diagnoseNagTimer = setTimeout(() => {
          diagnoseBtn.innerHTML = original;
          diagnoseBtn.style.color = '';
          diagnoseBtn.style.borderColor = '';
          diagnoseNagTimer = null;
        }, 1800);
        return;
      }
      showDiagnosis();
    }
  });

  // Level select: click case counter to toggle
  $('menu-case').addEventListener('click', e => {
    e.stopPropagation();
    toggleLevelSelect();
  });

  // Close dropdown when clicking elsewhere
  document.addEventListener('click', e => {
    if (levelSelectOpen && !levelSelectEl.contains(e.target)) {
      closeLevelSelect();
    }
  });

  window.addEventListener('resize', fitViewport);

  // ── Public API (for inline onclick handlers) ────────────────────
  window.SSS = {
    beginInvestigation,
    showFieldNotes,
    showBriefing,
    showDiagnosis,
    selectDiagnosis,
    confirmDiagnosis,
    selectSolution,
    confirmSolution,
    showExplanationScreen,
    nextCase,
    showVictory,
    newGame,
    resumeGame,
    declineResume,
    // Phase 1 (Campaign 2 foundation)
    backToTitle,
    // Phase 2 (Campaign 2 skeleton): character creation + call home onclick handlers
    selectSpecies,
    confirmCharCreation,
    cancelCharCreation,
    callHome
  };

  // ── Init ────────────────────────────────────────────────────────
  fitViewport();
  initStarfield(titleStars);
  initTitleSprites();
  setScreen('TITLE');

  // Phase 1 (Campaign 2 foundation): always load saved state on startup so the
  // title screen can read STATE.campaign1Complete and show the [INCOMING TRANSMISSION]
  // button. Previously STATE only got loaded when the player explicitly chose to
  // resume; now STATE always reflects the save, but we still gate the resume prompt
  // on whether they're mid-case (and not at the post-Campaign-1-victory state).
  const hasSave = loadState();
  if (hasSave) {
    STATE = hasSave;
  }
  // DEV: force the unlock without playing through Campaign 1
  if (DEV_CAMPAIGN1_COMPLETE) {
    STATE.campaign1Complete = true;
  }

  // Phase 2: point GAME_DATA.cases/ranks at whichever campaign the save says
  // is active. For brand-new saves and all existing C1 players this is a
  // no-op (currentCampaign defaults to 0 → C1 arrays).
  setActiveCampaign(STATE.currentCampaign || 0);

  // Suppress resume prompt if the save represents "just finished Campaign 1" —
  // currentCase at the end, diagnosed=true, campaign1Complete flag set. In that
  // state the player should land on the title screen and see the new button.
  const isPostC1Victory = hasSave &&
    hasSave.campaign1Complete &&
    hasSave.currentCase >= GAME_DATA.cases.length - 1 &&
    hasSave.caseState && hasSave.caseState.diagnosed;

  if (hasSave && hasSave.currentCase > 0 && !isPostC1Victory) {
    nameInput.focus();
    checkResume();
  } else {
    playTitleIntro();
  }

})();
</script>
</body>
</html>
