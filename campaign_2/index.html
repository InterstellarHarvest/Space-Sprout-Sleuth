<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Sprout Sleuth</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'VT323', monospace;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Scaling container ─────────────────────────────────────────── */
  #scale-root {
    width: 960px;
    height: 640px;
    transform-origin: center center;
  }

  /* ── Game shell ────────────────────────────────────────────────── */
  #game {
    width: 960px;
    height: 640px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    display: flex;
    flex-direction: column;
    color: #d1d5db;
    position: relative;
    overflow: hidden;
  }

  /* ── CRT scanline overlay ──────────────────────────────────────── */
  #game::after {
    content: '';
    pointer-events: none;
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.10),
      rgba(0,0,0,0.10) 1px,
      transparent 1px,
      transparent 2px
    );
    z-index: 100;
  }

  /* ── Menu bar ──────────────────────────────────────────────────── */
  #menu-bar {
    width: 960px;
    height: 36px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border-bottom: 4px solid;
    border-color: #444 #222 #222 #444;
    display: flex;
    align-items: center;
    padding: 0 14px;
    flex-shrink: 0;
    z-index: 10;
  }

  #saa-logo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    color: #06b6d4;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(6,182,212,0.5);
    position: relative;
  }

  #saa-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    cursor: pointer;
    transition: filter 0.2s;
  }

  #saa-icon:hover { filter: drop-shadow(0 0 4px rgba(6,182,212,0.8)); }

  #saa-abbr {
    transition: max-width 0.3s ease-out, opacity 0.2s ease-out;
    display: inline-block;
    max-width: 50px;
    overflow: hidden;
    white-space: nowrap;
    opacity: 1;
  }
  #saa-full {
    display: inline-block;
    max-width: 0;
    overflow: hidden;
    white-space: nowrap;
    opacity: 0;
    transition: max-width 0.4s ease-out, opacity 0.3s 0.1s ease-out;
  }

  #saa-logo.expanded #saa-abbr {
    max-width: 0;
    opacity: 0;
  }
  #saa-logo.expanded #saa-full {
    max-width: 300px;
    opacity: 1;
  }

  #game-title-bar {
    flex: 1;
    text-align: center;
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    color: #4a6a8a;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #menu-right {
    font-size: 18px;
    color: #8898a8;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: right;
    min-width: 200px;
  }

  #menu-rank {
    color: #06b6d4;
  }

  /* ── Two-column layout ─────────────────────────────────────────── */
  #content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left column (scene) ───────────────────────────────────────── */
  #left-col {
    width: 480px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 4px solid;
    border-color: #222 #444 #444 #222;
  }

  #location-banner {
    padding: 8px 14px;
    background: linear-gradient(180deg, #0f0f1a 0%, #0a0a14 100%);
    border-bottom: 3px solid;
    border-color: #444 #222 #222 #444;
    flex-shrink: 0;
  }

  #location-name {
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #06b6d4;
    text-shadow: 0 0 6px rgba(6,182,212,0.4);
  }

  #location-subtitle {
    font-size: 18px;
    color: #4a6a8a;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #scene-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0e1a;
    position: relative;
    overflow: hidden;
  }

  /* Star canvas — sits behind scene PNG, visible through transparent window */
  #scene-stars {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    display: none;
  }
  #scene-stars.active { display: block; }

  /* FX overlay canvas — sits on top of scene PNG, for mask-based effects (dust) */
  #scene-fx-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    pointer-events: none;
    display: none;
  }
  #scene-fx-overlay.active { display: block; }

  /* Static noise overlay for scene transitions */
  #scene-static {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    pointer-events: none;
    z-index: 10;
    display: none;
  }

  /* PNG scene image sits on top of fallback canvas */
  #scene-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    image-rendering: pixelated;
    display: none; /* hidden until PNG loads */
  }

  #scene-img.loaded { display: block; }
  #scene-img.scene-fade { transition: opacity 1.2s ease-in-out; }

  /* Connection screen overlay (Case 6 briefing) */
  #connection-screen {
    position: absolute;
    inset: 0;
    background: #0a0a12;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 20px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #4ecdc4;
    overflow: hidden;
  }
  #connection-screen.hidden { display: none; }
  #connection-screen .conn-line {
    opacity: 0;
    white-space: nowrap;
    margin: 2px 0;
    text-shadow: 0 0 6px #4ecdc488;
  }
  #connection-screen .conn-line.visible { opacity: 1; }
  #connection-screen .conn-line.dim { color: #2a6b65; text-shadow: none; }
  #connection-screen .conn-cursor { animation: blink-cursor 0.6s step-end infinite; }
  @keyframes blink-cursor { 50% { opacity: 0; } }

  /* ── Right column (info + actions) ─────────────────────────────── */
  #right-col {
    width: 480px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #speaker-bar {
    flex-shrink: 0;
    padding: 14px 18px 0 18px;
    position: relative;
  }
  #speaker-bar:empty { display: none; }
  #speaker-bar .back-link {
    position: absolute;
    top: 6px;
    right: 18px;
    margin: 0;
  }

  #info-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    scrollbar-width: thin;
    scrollbar-color: rgba(74,106,138,0.5) rgba(10,10,26,0.5);
  }

  #info-area::-webkit-scrollbar { width: 6px; }
  #info-area::-webkit-scrollbar-track { background: rgba(10,10,26,0.5); }
  #info-area::-webkit-scrollbar-thumb {
    background: rgba(74,106,138,0.5);
    border-radius: 3px;
  }

  .info-header {
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    text-shadow: 0 0 6px rgba(6,182,212,0.4);
  }

  .info-header.cyan { color: #06b6d4; }
  .info-header.green { color: #4ade80; }
  .info-header.red { color: #ef4444; }
  .info-header.amber { color: #f59e0b; }

  .info-body {
    font-size: 22px;
    line-height: 1.5;
    color: #b0b8c8;
    letter-spacing: 0.5px;
  }

  .info-body p { margin-bottom: 12px; }

  /* Speaker header */
  .speaker-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 2px solid rgba(74,106,138,0.3);
  }

  .speaker-portrait {
    width: 96px;
    height: 96px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border: 3px outset #444;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .speaker-portrait img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    object-fit: cover;
    display: block;
  }

  .speaker-portrait canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    display: block;
  }

  /* Emoji fallback when no PNG portrait */
  .speaker-portrait .portrait-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
  }

  /* Crew portrait thumbnail on action button */
  .action-btn .action-icon-canvas {
    width: 32px;
    height: 32px;
    image-rendering: pixelated;
    flex-shrink: 0;
  }

  /* Typewriter cursor blink */
  .typewriter-cursor {
    display: inline-block;
    width: 8px;
    height: 1.1em;
    background: #06b6d4;
    vertical-align: text-bottom;
    animation: blink-cursor 0.6s step-end infinite;
    margin-left: 2px;
  }

  .speaker-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .speaker-name {
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    color: #06b6d4;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 0 0 6px rgba(6,182,212,0.4);
  }

  .speaker-role {
    font-size: 18px;
    color: #4a6a8a;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Clue extract box */
  .clue-extract {
    margin-top: 14px;
    padding: 10px 14px;
    border-left: 4px solid #4ade80;
    background: rgba(74,222,128,0.06);
    font-size: 20px;
    color: #4ade80;
    letter-spacing: 0.5px;
  }

  .clue-extract-label {
    font-family: 'Press Start 2P', cursive;
    font-size: 7px;
    color: #2a8a4a;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ── Dialogue options ───────────────────────��─────────────────── */
  .dialogue-options {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .dialogue-option {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 20px;
    color: #c8d0e0;
    line-height: 1.3;
    letter-spacing: 0.3px;
    border: 1px solid rgba(74,106,138,0.15);
    background: rgba(20,30,50,0.3);
    transition: background 0.12s, border-color 0.12s, padding-left 0.12s;
  }

  .dialogue-option:hover {
    background: rgba(6,182,212,0.08);
    border-color: rgba(6,182,212,0.35);
    padding-left: 16px;
  }

  .dialogue-option::before {
    content: "▸ ";
    color: #06b6d4;
  }

  .dialogue-option.is-action {
    color: #06b6d4;
    font-style: italic;
  }

  .dialogue-option.is-action::before {
    content: "";
  }

  /* Source mood/state indicators */
  .mood-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
  }
  .mood-dot.friendly { background: #4ade80; }
  .mood-dot.neutral { background: transparent; }
  .mood-dot.annoyed { background: #f59e0b; }
  .mood-dot.angry { background: #ef4444; }

  .source-state {
    font-family: 'Press Start 2P', cursive;
    font-size: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: 8px;
  }
  .source-state.nominal { color: #4ade80; }
  .source-state.glitched { color: #f59e0b; }
  .source-state.offline { color: #ef4444; }

  /* Terminal-style text (sensors, logs) */
  .terminal-text {
    font-family: 'VT323', monospace;
    white-space: pre-wrap;
    color: #4ade80;
    background: rgba(0,20,0,0.2);
    padding: 10px 12px;
    border: 1px solid rgba(74,222,128,0.15);
    line-height: 1.35;
  }

  /* Examination prose text (plants) */
  .prose-text {
    color: #b8c8d8;
    font-style: italic;
    line-height: 1.5;
  }

  /* Locked source message */
  .locked-message {
    text-align: center;
    padding: 20px;
    color: #ef4444;
    font-size: 20px;
  }
  .locked-hint {
    color: #8898a8;
    font-size: 18px;
    margin-top: 8px;
  }

  /* Field notes list */
  .field-note {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(100,100,140,0.15);
  }

  .field-note-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .field-note-icon canvas {
    width: 28px;
    height: 28px;
    image-rendering: pixelated;
  }
  .field-note-icon img {
    max-width: 28px;
    max-height: 28px;
    image-rendering: pixelated;
    object-fit: contain;
  }

  .field-note-text {
    font-size: 20px;
    color: #b0b8c8;
    line-height: 1.4;
  }

  .field-note-new {
    animation: note-flash 0.6s ease-out;
  }

  @keyframes note-flash {
    0% { background: rgba(74,222,128,0.15); }
    100% { background: transparent; }
  }

  /* Diagnosis options */
  .diagnosis-option {
    padding: 10px 14px;
    margin-bottom: 8px;
    border: 2px solid rgba(74,106,138,0.3);
    cursor: pointer;
    font-size: 20px;
    color: #b0b8c8;
    line-height: 1.4;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .diagnosis-option:hover {
    background: rgba(6,182,212,0.06);
    border-color: rgba(6,182,212,0.4);
  }

  .diagnosis-option.selected {
    background: rgba(6,182,212,0.10);
    border-color: #06b6d4;
    color: #e0e8ff;
  }

  /* Hint box (wrong answer) */
  .hint-box {
    margin-top: 14px;
    padding: 10px 14px;
    border-left: 4px solid #f59e0b;
    background: rgba(245,158,11,0.06);
    font-size: 20px;
    color: #f59e0b;
    line-height: 1.4;
  }

  /* Fun fact box */
  .fun-fact-box {
    margin-top: 14px;
    padding: 10px 14px;
    border-left: 4px solid #4ade80;
    background: rgba(74,222,128,0.06);
    font-size: 20px;
    color: #a0d8b0;
    line-height: 1.4;
  }

  .fun-fact-label {
    font-family: 'Press Start 2P', cursive;
    font-size: 7px;
    color: #2a8a4a;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Score display */
  .score-line {
    font-size: 22px;
    color: #06b6d4;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  .score-penalty {
    color: #ef4444;
  }

  /* Back link */
  .back-link {
    font-size: 18px;
    color: #4a6a8a;
    cursor: pointer;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: inline-block;
    margin-left: auto;
    flex-shrink: 0;
  }

  .back-link:hover { color: #06b6d4; }

  /* ── Action buttons (bottom of right col) ──────────────────────── */
  #action-area {
    flex-shrink: 0;
    padding: 10px 14px 14px;
    border-top: 4px solid;
    border-color: #444 #222 #222 #444;
    background: linear-gradient(180deg, #0f0f1a 0%, #0a0a14 100%);
  }

  #action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
  }

  .action-btn {
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border: 3px outset #444;
    color: #d1d5db;
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s, border-color 0.1s;
    position: relative;
    height: 48px;
  }

  .action-btn .action-icon-img {
    max-width: 32px;
    max-height: 32px;
    image-rendering: pixelated;
    object-fit: contain;
    flex-shrink: 0;
  }

  .action-btn:hover {
    background: linear-gradient(180deg, #222240 0%, #1a1a2e 100%);
    border-color: #556;
  }

  .action-btn:active {
    border-style: inset;
    transform: translate(1px, 1px);
  }

  .action-btn .check {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: #4ade80;
    font-size: 18px;
    text-shadow: 0 0 6px rgba(74,222,128,0.5);
  }

  .action-btn.found {
    border-color: rgba(74,222,128,0.4);
  }

  .action-btn.visited {
    border-color: rgba(6,182,212,0.3);
  }
  .action-btn .visited-icon {
    color: #06b6d4;
    font-size: 22px;
    text-shadow: 0 0 6px rgba(6,182,212,0.4);
  }

  .action-btn.locked {
    border-color: rgba(239,68,68,0.5);
  }

  /* Federation Database button — subtle institutional accent to distinguish
     it from character conversation buttons. Campaign 2 only (C1 has no
     database source, so this class is never applied there). */
  .action-btn.database-btn {
    background: linear-gradient(180deg, #2a3040 0%, #1a2030 50%, #141820 100%);
    border-color: #7a8a9a;
    color: #c0ccd8;
  }
  .action-btn.database-btn:hover {
    background: linear-gradient(180deg, #353e50 0%, #242e3e 50%, #1a2028 100%);
    border-color: #a0b0c0;
    box-shadow: 0 0 8px rgba(160,176,192,0.3);
  }

  #diagnose-btn {
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border: 3px outset #06b6d4;
    color: #06b6d4;
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 10px;
    width: 100%;
    text-shadow: 0 0 6px rgba(6,182,212,0.4);
    transition: all 0.1s;
  }

  #diagnose-btn:hover {
    background: linear-gradient(180deg, #222240 0%, #1a1a2e 100%);
  }

  #diagnose-btn:active {
    border-style: inset;
    transform: translate(1px, 1px);
  }

  #diagnose-btn.pulse {
    animation: diagnose-pulse 2s ease-in-out infinite;
  }

  @keyframes diagnose-pulse {
    0%, 100% { box-shadow: 0 0 4px rgba(6,182,212,0.3); }
    50%       { box-shadow: 0 0 14px rgba(6,182,212,0.6), 0 0 24px rgba(6,182,212,0.3); }
  }

  /* Campaign 2 (Phase 2): 6-button action bar. The 5 source buttons plus
     Diagnose all live inside #action-grid as equal-sized cells (2 columns ×
     3 rows). The diagnose button keeps its cyan border and pulse so it stays
     visually findable, but matches .action-btn dimensions. Gated on
     #action-area.campaign-2 so Campaign 1 layout is untouched. */
  #action-area.campaign-2 #action-grid {
    margin-bottom: 0;
  }
  #action-area.campaign-2 #diagnose-btn {
    width: auto;
    font-size: 20px;
    letter-spacing: 1px;
    padding: 8px 10px;
    margin: 0;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Retro button (reusable) ───────────────────────────────────── */
  .retro-btn {
    background: linear-gradient(180deg, #4a4a4a 0%, #2a2a2a 50%, #1a1a1a 100%);
    border: 3px outset #666;
    color: #d1d5db;
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 2px 2px 0 #000;
    cursor: pointer;
    padding: 8px 18px;
    margin-top: 14px;
    transition: all 0.1s;
  }

  .retro-btn:hover {
    background: linear-gradient(180deg, #5a5a5a 0%, #3a3a3a 50%, #2a2a2a 100%);
  }

  .retro-btn:active {
    border-style: inset;
    transform: translate(2px, 2px);
  }

  .retro-btn.accent {
    border-color: #06b6d4;
    color: #06b6d4;
    text-shadow: 0 0 6px rgba(6,182,212,0.4);
  }

  .retro-btn.green {
    border-color: #4ade80;
    color: #4ade80;
    text-shadow: 0 0 6px rgba(74,222,128,0.4);
  }

  /* Campaign 2: "Incoming Transmission" terminal on title screen.
     Combined mini-CRT terminal with signal-lock bars, glitch-decode text,
     and blinking cursor. Hidden until STATE.campaign1Complete is true. */
  #transmission-btn {
    background: #050a0f;
    border: 4px inset #3a3a3a;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 2px 8px rgba(0,0,0,0.5);
    padding: 12px 20px 10px;
    cursor: pointer;
    position: relative;
    text-align: left;
    width: fit-content;
    align-self: center;
    min-width: 320px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: box-shadow 0.3s;
    z-index: 1;
  }
  #transmission-btn.hidden { display: none; }
  #transmission-btn:hover {
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 16px rgba(245,158,11,0.3);
  }
  .tx-scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
  }
  .tx-led {
    position: absolute;
    top: 6px;
    right: 8px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #333;
    transition: background 0.5s, box-shadow 0.5s;
  }
  .tx-led.active {
    background: #f59e0b;
    box-shadow: 0 0 4px #f59e0b;
    animation: tx-led-blink 2s ease-in-out infinite;
  }
  @keyframes tx-led-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .tx-bars {
    display: flex;
    flex-direction: column-reverse;
    gap: 2px;
    width: 16px;
    flex-shrink: 0;
  }
  .tx-bar {
    height: 4px;
    background: #222;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .tx-bar.active {
    background: #f59e0b;
    box-shadow: 0 0 4px #f59e0b;
  }
  .tx-text {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 1px;
    color: #f59e0b;
    text-shadow: 0 0 6px rgba(245,158,11,0.5);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tx-text.visible { opacity: 1; }
  .tx-cursor {
    display: inline-block;
    width: 10px;
    height: 18px;
    background: #f59e0b;
    margin-left: 4px;
    vertical-align: text-bottom;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tx-cursor.active {
    opacity: 1;
    animation: tx-cursor-blink 1s step-end infinite;
  }
  @keyframes tx-cursor-blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* Briefing header pulse — plays while connection screen animates */
  .briefing-header-pulse {
    animation: briefing-pulse 1.2s ease-in-out infinite;
  }
  @keyframes briefing-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; text-shadow: 0 0 10px rgba(6,182,212,0.6); }
  }

  /* Campaign 2: "Call Home" hint button in field notes */
  .call-home-btn {
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 1px;
    color: #f59e0b;
    border: 2px outset #f59e0b;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    padding: 4px 10px;
    cursor: pointer;
    float: right;
    margin-top: -2px;
    transition: all 0.1s;
  }
  .call-home-btn:hover {
    background: linear-gradient(180deg, #2a1a0e 0%, #1a1008 100%);
    box-shadow: 0 0 8px rgba(245,158,11,0.3);
  }
  .call-home-btn:active {
    border-style: inset;
    transform: translate(1px, 1px);
  }
  .call-home-btn.used {
    opacity: 0.35;
    pointer-events: none;
    border-style: inset;
  }

  /* Campaign 2: dual-portrait briefing frame (Nova + Zel'keth) */
  .briefing-handlers {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 8px 0 12px;
  }
  .handler-portrait {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .handler-portrait canvas {
    width: 96px;
    height: 96px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border: 3px outset #444;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
    image-rendering: pixelated;
  }
  .handler-name {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #8898a8;
    letter-spacing: 1px;
  }

  /* Campaign 2 unlock notification on the Campaign 1 victory screen */
  .victory-unlock {
    margin-top: 18px;
    padding: 12px 22px;
    border: 2px solid rgba(6,182,212,0.5);
    background: rgba(6,182,212,0.06);
    max-width: 540px;
    z-index: 1;
    text-align: center;
  }
  .victory-unlock-header {
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    color: #06b6d4;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(6,182,212,0.6);
    margin-bottom: 8px;
    animation: transmission-pulse 1.6s ease-in-out infinite;
  }
  .victory-unlock-body {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #a8d8e8;
    line-height: 1.4;
  }

  .retro-btn.disabled {
    opacity: 0.3;
    cursor: default;
    pointer-events: none;
  }

  /* ── Full-screen overlays ──────────────────────────────────────── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: opacity 0.3s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Title screen */
  #title-screen {
    background: radial-gradient(ellipse at center, #0d1a2e 0%, #050a14 70%, #000 100%);
    flex-direction: column;
    gap: 20px;
  }

  #title-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #title-logo {
    font-family: 'Press Start 2P', cursive;
    font-size: 18px;
    color: #06b6d4;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(6,182,212,0.6), 0 0 40px rgba(6,182,212,0.2);
    text-align: center;
    z-index: 1;
  }

  #title-sub {
    font-family: 'Press Start 2P', cursive;
    font-size: 8px;
    color: #4a6a8a;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 6px;
  }

  #title-sprout {
    font-size: 48px;
    z-index: 1;
    text-shadow: 0 0 20px rgba(74,222,128,0.4);
  }

  .title-input-wrap {
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .title-label {
    font-family: 'Press Start 2P', cursive;
    font-size: 8px;
    color: #4a6a8a;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #name-input {
    background: rgba(10,20,40,0.8);
    border: 3px solid #333;
    border-color: #222 #444 #444 #222;
    color: #06b6d4;
    font-family: 'VT323', monospace;
    font-size: 24px;
    letter-spacing: 2px;
    text-align: center;
    padding: 8px 16px;
    width: 260px;
    outline: none;
  }

  #name-input:focus {
    border-color: rgba(6,182,212,0.5);
    box-shadow: 0 0 10px rgba(6,182,212,0.2);
  }

  #name-input::placeholder { color: #2a4a5a; }

  /* Victory screen */
  #victory-screen {
    background: radial-gradient(ellipse at center, #0d1a2e 0%, #050a14 70%, #000 100%);
    flex-direction: column;
    gap: 16px;
  }

  .victory-title {
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    color: #f59e0b;
    letter-spacing: 3px;
    text-shadow: 0 0 14px rgba(245,158,11,0.5);
    text-transform: uppercase;
    z-index: 1;
  }

  .victory-rank {
    font-family: 'Press Start 2P', cursive;
    font-size: 11px;
    color: #06b6d4;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(6,182,212,0.5);
    text-transform: uppercase;
    z-index: 1;
  }

  .victory-score {
    font-size: 28px;
    color: #d1d5db;
    letter-spacing: 2px;
    z-index: 1;
  }

  .victory-breakdown {
    z-index: 1;
    text-align: center;
  }

  /* Campaign 2 victory: two-column layout */
  .c2-victory-layout {
    display: grid;
    grid-template-rows: auto auto auto;
    grid-template-columns: 420px 1fr;
    align-content: center;
    z-index: 1;
  }
  .c2-victory-header {
    grid-column: 1 / -1;
    text-align: center;
    padding: 10px 0 0;
  }
  .c2-victory-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 30px;
  }
  .c2-victory-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 24px;
  }
  .c2-victory-footer {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4px 0 8px;
  }
  .c2-case-line {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 21px;
    color: #6a8a9a;
  }
  .c2-case-line .pts {
    color: #4ade80;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .c2-victory-dialogue .speaker {
    color: #f59e0b;
    font-size: 18px;
  }
  .c2-victory-dialogue .line {
    font-size: 19px;
    color: #b0c8d8;
    margin-bottom: 10px;
  }

  .victory-case-line {
    font-size: 20px;
    color: #8898a8;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  /* Resume prompt */
  #resume-prompt {
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    gap: 16px;
  }

  .resume-panel {
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border: 4px solid;
    border-color: #444 #222 #222 #444;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.6);
    padding: 24px 30px;
    text-align: center;
    z-index: 1;
  }

  .resume-panel h2 {
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    color: #06b6d4;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    text-shadow: 0 0 8px rgba(6,182,212,0.4);
  }

  .resume-panel p {
    font-size: 22px;
    color: #b0b8c8;
    margin-bottom: 16px;
  }

  .resume-btns {
    display: flex;
    gap: 14px;
    justify-content: center;
  }

  /* Campaign 2 character creation popup (Phase 2) */
  #char-create {
    background: rgba(0,0,0,0.88);
    flex-direction: column;
    gap: 0;
  }
  .char-create-panel {
    background: linear-gradient(180deg, #0f1a2e 0%, #081018 100%);
    border: 4px solid;
    border-color: #06b6d4 #0e4d5e #0e4d5e #06b6d4;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 24px rgba(6,182,212,0.3);
    padding: 16px 28px 18px;
    max-width: 740px;
    text-align: center;
    z-index: 1;
  }
  .char-create-panel h2 {
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    color: #06b6d4;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-shadow: 0 0 8px rgba(6,182,212,0.5);
  }
  .char-create-blurb {
    font-family: 'VT323', monospace;
    font-size: 19px;
    color: #b0c8d8;
    line-height: 1.3;
    margin-bottom: 10px;
    padding: 0 8px;
  }
  .char-create-label {
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    color: #06b6d4;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 12px 0 8px;
  }
  #char-create-name {
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: #e0f0ff;
    background: #050a12;
    border: 3px inset #06b6d4;
    padding: 6px 12px;
    width: 320px;
    max-width: 100%;
    text-align: center;
    outline: none;
  }
  #char-create-name.invalid {
    border-color: #f87171;
  }
  .char-create-error {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #f87171;
    min-height: 22px;
    margin-top: 4px;
  }
  .species-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 6px 0 8px;
  }
  .species-option {
    background: linear-gradient(180deg, #1a2332 0%, #0a1018 100%);
    border: 3px outset #3a5a7a;
    padding: 10px 8px 8px;
    cursor: pointer;
    transition: border-color 0.1s, background 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .species-option:hover {
    border-color: #06b6d4;
    background: linear-gradient(180deg, #22334a 0%, #0f1a2a 100%);
  }
  .species-option.selected {
    border-style: inset;
    border-color: #06b6d4;
    background: linear-gradient(180deg, #0a2a3a 0%, #051520 100%);
    box-shadow: inset 0 0 12px rgba(6,182,212,0.3);
  }
  .species-portrait-placeholder {
    width: 64px;
    height: 64px;
    background: #0a1520;
    border: 2px solid #3a5a7a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }
  .species-option.selected .species-portrait-placeholder {
    border-color: #06b6d4;
  }
  .species-name {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #d1e0f0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .char-create-confirm {
    margin-top: 14px;
  }
  .char-create-confirm.disabled {
    opacity: 0.45;
    pointer-events: none;
  }
  .species-tooltip {
    position: fixed;
    background: linear-gradient(180deg, #0a1520 0%, #050a0f 100%);
    border: 2px solid #06b6d4;
    box-shadow: 0 0 12px rgba(6,182,212,0.35);
    padding: 8px 12px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #a0c0d8;
    line-height: 1.35;
    text-align: left;
    max-width: 360px;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1px 8px;
  }
  .species-tooltip.visible {
    opacity: 1;
  }
  .species-tooltip .tip-label {
    color: #06b6d4;
    white-space: nowrap;
  }
  .species-tooltip .tip-value {
    color: #a0c0d8;
  }

  /* ── Level select dropdown ──────────────────────────────────────── */
  #menu-bar { position: relative; }
  #menu-case { cursor: pointer; }
  #menu-case:hover { color: #06b6d4; }

  #level-select {
    position: absolute;
    top: 100%;
    right: 14px;
    background: linear-gradient(180deg, #1a2a3a, #0a1520);
    border: 2px solid #3a6a8a;
    z-index: 110;
    min-width: 340px;
    padding: 8px 0;
    display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }

  .level-option {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #b0b8c8;
    gap: 10px;
  }

  .level-option.locked {
    color: #4a5a6a;
  }

  .level-option.current {
    color: #4ade80;
    background: rgba(74,222,128,0.06);
  }

  .level-option-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  .level-option-name { flex: 1; }

  .level-option-score {
    font-size: 18px;
    color: #06b6d4;
    flex-shrink: 0;
  }

  .level-option-lock {
    font-size: 16px;
    color: #4a5a6a;
    flex-shrink: 0;
  }

  /* ── Title screen sprite support ───────────────────────────────── */
  #title-sprout-img {
    width: 96px;
    height: 96px;
    image-rendering: pixelated;
    z-index: 1;
    display: none;
  }

  #title-sprout-img.loaded { display: block; }
  #title-sprout.hidden { display: none; }

  /* ── Title intro animation ──────────────────────────────────── */
  .intro-hidden { opacity: 0 !important; pointer-events: none !important; }

  #skip-hint {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 14px;
    color: #3a4a5a;
    z-index: 60;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #skip-hint.visible { opacity: 1; }

  /* ── Rank badge sprite support ─────────────────────────────────── */
  .rank-badge-canvas, .rank-badge-img {
    width: 280px;
    height: 280px;
    image-rendering: pixelated;
    border-radius: 16px;
  }

  .rank-badge-fallback {
    font-size: 48px;
  }

  /* ── Screen shake on wrong diagnosis ─────────────────────────── */
  @keyframes screenShake {
    0%   { transform: translate(0, 0); }
    10%  { transform: translate(-4px, 2px); }
    20%  { transform: translate(3px, -3px); }
    30%  { transform: translate(-3px, 1px); }
    40%  { transform: translate(2px, -2px); }
    50%  { transform: translate(-2px, 3px); }
    60%  { transform: translate(3px, -1px); }
    70%  { transform: translate(-1px, 2px); }
    80%  { transform: translate(1px, -1px); }
    90%  { transform: translate(-1px, 0); }
    100% { transform: translate(0, 0); }
  }
  #game.shake { animation: screenShake 0.4s ease-out; }

  /* ── Content fade transition ───────────────────────────────────── */
  .fade-in {
    animation: fadeIn 0.25s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Badge rank-up pixelate transition ─────────────────────────── */
  .badge-pixelate-canvas {
    width: 320px;
    height: 320px;
    image-rendering: pixelated;
    border-radius: 16px;
    margin: 0 auto;
    display: block;
  }

</style>

  <!-- Two-column content -->

        <div id="location-subtitle">Low Earth Orbit</div>

        <canvas id="scene-stars" width="240" height="280"></canvas>
